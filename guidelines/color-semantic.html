<!-- @dsCard group="Colors" viewport="700x150" name="Semantic / status" subtitle="Success · Warning · Danger · Info" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{padding:20px;background:var(--bg-0);}</style></head><body>
<div style="display:flex;gap:12px;">
  <div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div style="height:52px;border-radius:6px;background:var(--success);border:1px solid var(--border-1);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">success</div></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div style="height:52px;border-radius:6px;background:var(--warning);border:1px solid var(--border-1);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">warning</div></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div style="height:52px;border-radius:6px;background:var(--danger);border:1px solid var(--border-1);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">danger</div></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div style="height:52px;border-radius:6px;background:var(--info);border:1px solid var(--border-1);"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-2);">info</div></div>
</div></body></html>
