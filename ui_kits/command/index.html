<!-- @dsCard group="Command" viewport="1280x760" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Command palette</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
#root{min-height:100vh;} *::-webkit-scrollbar{width:8px;} *::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:999px;}
/* Mechanical entrance — the palette drops in like a switched instrument
   (140ms, no bounce). Defined only under no-preference so reduced motion
   gets an instant open with no delay artifacts. */
@media (prefers-reduced-motion: no-preference){
  .fz-scrim{animation:fz-fadein .12s ease-out;}
  @keyframes fz-fadein{from{opacity:0}}
  .fz-pop{animation:fz-pop .14s cubic-bezier(0.2,0,0,1);}
  @keyframes fz-pop{from{opacity:0;transform:scale(.98) translateY(-4px)}}
  .fz-fade{animation:fz-fadein .25s ease-out;}
}
/* The hero ⌘K keycap depresses when the real shortcut is pressed. */
.fz-kbd{display:inline-block;transition:transform var(--dur-fast) var(--ease-standard),background var(--dur-fast) var(--ease-standard);}
.fz-kbd-down{transform:translateY(1px);background:var(--bg-3) !important;}
</style>
</head>
<body>
<div id="root">
  <!-- Static fallback — replaced by React on mount. Two jobs: real content
       during the Babel compile (instead of a blank page), and a functioning
       page when the CDN runtime never arrives (offline / blocked unpkg).
       styles.css is local, so tokens work without network. Keep copy in sync
       with the React components below when editing either. -->
  <div style="background:var(--bg-0);min-height:100vh">
    <header style="display:flex;align-items:center;gap:12px;height:56px;padding:0 28px;border-bottom:1px solid var(--border-1);background:var(--surface-overlay)">
      <div style="width:22px;height:22px;border:2px solid var(--fg-1);border-radius:3px;position:relative"><div style="position:absolute;inset:4px;background:var(--accent);border-radius:1px"></div></div>
      <span style="font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-.02em;color:var(--fg-1)">Futurist</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">// command palette</span>
    </header>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:80px 20px;text-align:center">
      <h1 style="font-size:26px;font-weight:700;letter-spacing:-.02em;color:var(--fg-1)">Command palette</h1>
      <p style="font-size:14px;color:var(--fg-2);max-width:380px;line-height:1.55">Press <kbd style="font-family:var(--font-mono);font-size:12px;padding:2px 8px;border:1px solid var(--border-2);border-radius:var(--radius-sm);color:var(--fg-1);background:var(--bg-2)">⌘K</kbd> to open. Type to filter, arrow keys to move, enter to run.</p>
    </div>
    <!-- Palette in its opening (open) state, as the kit first presents it. -->
    <div style="position:fixed;inset:0;display:flex;align-items:flex-start;justify-content:center;padding:12vh 16px;background:var(--scrim)">
      <div style="width:100%;max-width:560px;background:var(--bg-1);border:1px solid var(--border-1);border-radius:var(--radius-xl);box-shadow:var(--shadow-3);overflow:hidden">
        <div style="display:flex;align-items:center;gap:8px;padding:0 16px;height:52px;border-bottom:1px solid var(--border-1)">
          <span style="color:var(--fg-3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
          <span style="flex:1;font-size:15px;font-family:var(--font-sans);color:var(--fg-3)">Type a command or search…</span>
          <span style="font-family:var(--font-mono);font-size:11px;padding:2px 8px;border:1px solid var(--border-2);border-radius:var(--radius-sm);color:var(--fg-3)">ESC</span>
        </div>
        <div style="padding:4px">
          <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-3);padding:12px 12px 4px">Navigate</div>
          <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:var(--radius-md);background:var(--accent-subtle);color:var(--accent-subtle-fg)">
            <span style="flex:1;font-size:13.5px;font-weight:600;font-family:var(--font-sans)">Go to Services</span>
            <span style="font-family:var(--font-mono);font-size:11px">G S</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;color:var(--fg-1)">
            <span style="flex:1;font-size:13.5px;font-weight:500;font-family:var(--font-sans)">Go to Deployments</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">G D</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;color:var(--fg-1)">
            <span style="flex:1;font-size:13.5px;font-weight:500;font-family:var(--font-sans)">Go to Logs</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">G L</span>
          </div>
          <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-3);padding:12px 12px 4px">Actions</div>
          <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;color:var(--fg-1)">
            <span style="flex:1;font-size:13.5px;font-weight:500;font-family:var(--font-sans)">New deploy</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">⌘N</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;color:var(--fg-1)">
            <span style="flex:1;font-size:13.5px;font-weight:500;font-family:var(--font-sans)">Open project settings</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">⌘,</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:16px;padding:8px 16px;border-top:1px solid var(--border-1);background:var(--bg-2);font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">
          <span>↑↓ navigate</span><span>↵ select</span><span>esc close</span>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="text/plain" id="app-src">
const { useState, useEffect, useRef, useMemo } = React;
const Ic = ({d,size=16,sw=1.7}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  search:<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>, arrow:<path d="M5 12h14M13 6l6 6-6 6"/>,
  server:<><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="13" width="18" height="7" rx="1.5"/><path d="M7 7.5h.01M7 16.5h.01"/></>,
  deploy:<path d="M12 2L4 7v10l8 5 8-5V7z M12 2v20M4 7l8 5 8-5"/>, doc:<><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></>,
  user:<><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></>, gear:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8M4.6 9a1.6 1.6 0 00-.3-1.8"/></>,
  moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>, sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2"/></>,
  plus:<path d="M12 5v14M5 12h14"/>, logout:<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>,
  bolt:<path d="M13 2L4 14h7l-2 8 9-12h-7l2-8z"/>,
};
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

const commands = [
  {g:"Navigate",items:[
    {ic:'server',label:'Go to Services',hint:'G S'},
    {ic:'deploy',label:'Go to Deployments',hint:'G D'},
    {ic:'doc',label:'Go to Logs',hint:'G L'},
  ]},
  {g:"Actions",items:[
    {ic:'plus',label:'New deploy',hint:'⌘N',accent:true},
    {ic:'bolt',label:'Trigger incident drill',hint:''},
    {ic:'gear',label:'Open project settings',hint:'⌘,'},
  ]},
  {g:"Services",items:[
    {ic:'server',label:'api-gateway',hint:'us-east-1',mono:true},
    {ic:'server',label:'billing-worker',hint:'eu-west-1',mono:true},
    {ic:'server',label:'search-index',hint:'ap-south-1',mono:true},
  ]},
  {g:"Account",items:[
    {ic:'user',label:'View profile',hint:''},
    {ic:'moon',label:'Toggle theme',hint:'⌘⇧L'},
    {ic:'logout',label:'Sign out',hint:'',danger:true},
  ]},
];

function Palette({onClose,onToggleTheme,onRun}) {
  const [q,setQ]=useState('');
  const [sel,setSel]=useState(0);
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current&&inputRef.current.focus();},[]);
  const flat=useMemo(()=>{
    const out=[]; commands.forEach(sec=>{const hits=sec.items.filter(it=>it.label.toLowerCase().includes(q.toLowerCase())); if(hits.length)out.push({header:sec.g}); hits.forEach(it=>out.push(it));}); return out;
  },[q]);
  const selectable=flat.filter(x=>!x.header);
  useEffect(()=>{setSel(0);},[q]);
  useEffect(()=>{
    const k=(e)=>{
      if(e.key==='Escape')onClose();
      if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,selectable.length-1));}
      if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}
      if(e.key==='Enter'){const it=selectable[sel]; if(!it)return; if(it.label==='Toggle theme')onToggleTheme(); else onRun(it);}
    };
    window.addEventListener('keydown',k); return ()=>window.removeEventListener('keydown',k);
  },[sel,selectable]);
  let si=-1;
  return <div className="fz-scrim" onMouseDown={onClose} style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'12vh 16px',background:'var(--scrim)',backdropFilter:'blur(3px)'}}>
    <div className="fz-pop" onMouseDown={e=>e.stopPropagation()} style={{width:'100%',maxWidth:560,background:'var(--bg-1)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-xl)',boxShadow:'var(--shadow-3)',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'0 16px',height:52,borderBottom:'1px solid var(--border-1)'}}>
        <span style={{color:'var(--fg-3)'}}><Icon name="search" size={18}/></span>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Type a command or search…" style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:15,fontFamily:'var(--font-sans)',color:'var(--fg-1)'}}/>
        <span style={{fontFamily:'var(--font-mono)',fontSize:11,padding:'2px 8px',border:'1px solid var(--border-2)',borderRadius:'var(--radius-sm)',color:'var(--fg-3)'}}>ESC</span>
      </div>
      <div style={{maxHeight:380,overflow:'auto',padding:4}}>
        {flat.length===0?<div style={{padding:'32px 16px',textAlign:'center',color:'var(--fg-3)',fontSize:13}}>No results for “{q}”</div>:flat.map((row,i)=>{
          if(row.header)return <div key={i} style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)',padding:'12px 12px 4px'}}>{row.header}</div>;
          si++; const on=si===sel; const idx=si;
          return <button type="button" key={i} onMouseEnter={()=>setSel(idx)} onClick={()=>{if(row.label==='Toggle theme')onToggleTheme(); else onRun(row);}} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'8px 12px',border:'none',borderRadius:'var(--radius-md)',cursor:'pointer',textAlign:'left',background:on?'var(--accent-subtle)':'transparent',color:row.danger?'var(--danger)':on?'var(--accent-subtle-fg)':'var(--fg-1)',transition:'background var(--dur-fast)'}}>
            <span style={{display:'inline-flex',color:row.danger?'var(--danger)':on?'var(--accent-subtle-fg)':'var(--fg-3)'}}><Icon name={row.ic} size={17}/></span>
            <span style={{flex:1,fontSize:13.5,fontWeight:on?600:500,fontFamily:row.mono?'var(--font-mono)':'var(--font-sans)'}}>{row.label}</span>
            {row.hint?<span style={{fontFamily:'var(--font-mono)',fontSize:11,color:on?'var(--accent-subtle-fg)':'var(--fg-3)'}}>{row.hint}</span>:null}
            {on?<span style={{color:'var(--accent-subtle-fg)'}}><Icon name="arrow" size={14}/></span>:null}
          </button>;
        })}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16,padding:'8px 16px',borderTop:'1px solid var(--border-1)',background:'var(--bg-2)',fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>
        <span>↑↓ navigate</span><span>↵ select</span><span>esc close</span>
      </div>
    </div>
  </div>;
}

function App() {
  const [dark,setDark]=useState(false);
  const [open,setOpen]=useState(true);
  /* last: the most recent command "run" from the palette — the demo loop's
     receipt, shown as a dotted-leader status line under the hero. */
  const [last,setLast]=useState(null);
  const [kbdDown,setKbdDown]=useState(false);
  const setTheme=(d)=>{setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  const run=(it)=>{setLast(it);setOpen(false);};
  useEffect(()=>{
    const k=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();setKbdDown(true);setTimeout(()=>setKbdDown(false),160);setOpen(true);}};
    window.addEventListener('keydown',k); return ()=>window.removeEventListener('keydown',k);
  },[]);
  return <div style={{background:'var(--bg-0)',minHeight:'100vh'}}>
    <header style={{position:'sticky',top:0,zIndex:10,display:'flex',alignItems:'center',gap:12,height:56,padding:'0 28px',borderBottom:'1px solid var(--border-1)',background:'var(--surface-overlay)',backdropFilter:'blur(10px)'}}>
      <div style={{width:22,height:22,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:16,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Futurist</span>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>// command palette</span>
      <button type="button" onClick={()=>setTheme(!dark)} aria-label="theme" style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:8,height:30,padding:'0 12px',border:'1px solid var(--border-1)',borderRadius:'var(--radius-md)',background:'transparent',color:'var(--fg-2)',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.04em'}}><Icon name={dark?'sun':'moon'} size={14}/>{dark?'DARK':'LIGHT'}</button>
    </header>
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:'80px 20px',textAlign:'center'}}>
      <div style={{width:44,height:44,borderRadius:'var(--radius-lg)',background:'var(--accent-subtle)',color:'var(--accent-subtle-fg)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="search" size={22}/></div>
      <h1 style={{fontSize:26,fontWeight:700,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Command palette</h1>
      <p style={{fontSize:14,color:'var(--fg-2)',maxWidth:380,lineHeight:1.55}}>Press <kbd className={'fz-kbd'+(kbdDown?' fz-kbd-down':'')} style={{fontFamily:'var(--font-mono)',fontSize:12,padding:'2px 8px',border:'1px solid var(--border-2)',borderRadius:'var(--radius-sm)',color:'var(--fg-1)',background:'var(--bg-2)'}}>⌘K</kbd> to open. Type to filter, arrow keys to move, enter to run.</p>
      <button type="button" onClick={()=>setOpen(true)} style={{height:36,padding:'0 16px',border:'1px solid var(--border-3)',borderRadius:'var(--radius-md)',background:'var(--bg-1)',color:'var(--fg-1)',fontSize:13,fontWeight:500,fontFamily:'var(--font-sans)',cursor:'pointer'}}>Open palette</button>
      {last?<div key={last.label} className="fz-fade" style={{display:'flex',alignItems:'baseline',width:280,marginTop:8,fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}} role="status">
        <span>last run</span>
        <span aria-hidden="true" style={{flex:1,margin:'0 8px',borderBottom:'1px dotted var(--border-3)',transform:'translateY(-3px)'}}/>
        <span style={{color:'var(--fg-2)',fontFamily:last.mono?'var(--font-mono)':'var(--font-sans)',fontSize:last.mono?12:13}}>{last.label}</span>
      </div>:null}
    </div>
    {open?<Palette onClose={()=>setOpen(false)} onToggleTheme={()=>setTheme(!dark)} onRun={run}/>:null}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function () {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    new Function('React', 'ReactDOM', out)(window.React, window.ReactDOM);
  })();
</script>
</body>
</html>
