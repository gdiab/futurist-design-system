<!-- @dsCard group="Mobile" viewport="900x820" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Mobile</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>#root{min-height:100vh;} *::-webkit-scrollbar{width:0;height:0;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState } = React;
const Ic = ({d,size=22,sw=1.8,fill=false}) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill?'currentColor':'none'} stroke={fill?'none':'currentColor'} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  home:<path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/>, flame:<path d="M12 2s5 4 5 9a5 5 0 01-10 0c0-2 1-3 1-3s0 2 2 2c0-3 2-5 2-8z"/>,
  bell:<path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/>, user:<><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></>,
  up:<path d="M12 19V5M6 11l6-6 6 6"/>, chat:<path d="M21 12a8 8 0 01-11.5 7.2L3 21l1.8-6.5A8 8 0 1121 12z"/>,
  back:<path d="M15 6l-6 6 6 6"/>, share:<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></>,
  sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>, moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
};
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

const stories=[
  {t:"Sub-millisecond time-series engine in Zig",src:"github.com",pts:842,cm:214,tag:"Show HN",time:"2h"},
  {t:"The hidden cost of observability at scale",src:"futurist.dev",pts:611,cm:158,tag:null,time:"4h"},
  {t:"WebGPU is becoming the default for compute",src:"chromium.org",pts:497,cm:302,tag:null,time:"5h"},
  {t:"Postgres 18 ships async I/O — benchmarks",src:"postgresql.org",pts:1204,cm:389,tag:"Hot",time:"6h"},
  {t:"We deleted 30k lines rewriting our scheduler",src:"asterisk.mag",pts:388,cm:97,tag:null,time:"7h"},
  {t:"Reading flame graphs without losing your mind",src:"wired.com",pts:266,cm:54,tag:null,time:"9h"},
];

function Badge({tone,children}) { const T={accent:['var(--accent-subtle)','var(--accent-subtle-fg)'],warning:['var(--warning-subtle)','var(--warning-subtle-fg)']}[tone]; return <span style={{display:'inline-flex',height:16,padding:'0 8px',alignItems:'center',borderRadius:'var(--radius-sm)',fontFamily:'var(--font-mono)',fontSize:9,fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase',background:T[0],color:T[1]}}>{children}</span>; }

function Feed({onOpen}) {
  return <div style={{display:'flex',flexDirection:'column'}}>
    {stories.map((s,i)=><button key={i} onClick={()=>onOpen(s)} style={{display:'grid',gridTemplateColumns:'40px 1fr',gap:12,alignItems:'start',padding:'16px',border:'none',borderBottom:'1px solid var(--border-1)',background:'transparent',textAlign:'left',cursor:'pointer',minHeight:44}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,paddingTop:2,color:'var(--fg-3)'}}><Icon name="up" size={18}/><span style={{fontFamily:'var(--font-mono)',fontSize:11,fontWeight:600}}>{s.pts}</span></div>
      <div style={{display:'flex',flexDirection:'column',gap:8,minWidth:0}}>
        <span style={{fontSize:15,fontWeight:600,color:'var(--fg-1)',lineHeight:1.3}}>{s.t}</span>
        <div style={{display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>
          {s.tag?<Badge tone={s.tag==='Hot'?'warning':'accent'}>{s.tag}</Badge>:null}
          <span>{s.src}</span><span style={{opacity:.5}}>·</span><span style={{display:'inline-flex',alignItems:'center',gap:4}}><Icon name="chat" size={12}/>{s.cm}</span><span style={{opacity:.5}}>·</span><span>{s.time}</span>
        </div>
      </div>
    </button>)}
  </div>;
}

function Detail({s,onBack}) {
  return <div>
    <div style={{padding:'8px 8px 0'}}>
      <button onClick={onBack} style={{display:'inline-flex',alignItems:'center',gap:4,height:40,padding:'0 8px',border:'none',background:'transparent',color:'var(--fg-2)',cursor:'pointer',fontSize:14,fontWeight:500,fontFamily:'var(--font-sans)'}}><Icon name="back" size={20}/>Feed</button>
    </div>
    <div style={{padding:'8px 20px 20px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>{s.tag?<Badge tone={s.tag==='Hot'?'warning':'accent'}>{s.tag}</Badge>:null}<span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>{s.src} · {s.time} ago</span></div>
      <h1 style={{fontSize:22,fontWeight:700,letterSpacing:'-.02em',lineHeight:1.2,color:'var(--fg-1)',marginBottom:16}}>{s.t}</h1>
      <p style={{fontSize:15,color:'var(--fg-2)',lineHeight:1.65,marginBottom:16}}>After two years fighting GC pauses in our Go collector, we rewrote the ingest path. Median write latency dropped from 4ms to 0.7ms at four million points per second.</p>
      <p style={{fontSize:15,color:'var(--fg-2)',lineHeight:1.65}}>The rewrite leans on a slab allocator with per-core arenas, so hot-path writes never touch a shared lock. The payoff shows up in the tail: p99.9 now sits at 3.1ms.</p>
    </div>
    <div style={{display:'flex',gap:8,padding:'12px 16px',borderTop:'1px solid var(--border-1)',borderBottom:'1px solid var(--border-1)'}}>
      <button style={{flex:1,height:44,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,border:'none',borderRadius:'var(--radius-md)',background:'var(--accent)',color:'var(--accent-fg)',fontSize:14,fontWeight:600,fontFamily:'var(--font-mono)',cursor:'pointer'}}><Icon name="up" size={17}/>{s.pts}</button>
      <button style={{width:52,height:44,display:'inline-flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--border-3)',borderRadius:'var(--radius-md)',background:'var(--bg-1)',color:'var(--fg-2)',cursor:'pointer'}}><Icon name="share" size={17}/></button>
    </div>
    <div style={{padding:'16px'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--fg-3)'}}>{s.cm} comments</span>
      {[["lin.dev","Impressive median — what about p99.9 under noisy neighbors?"],["kira_v","~3.1ms. Per-core arenas keep the curve flat."]].map((c,i)=><div key={i} style={{display:'flex',gap:8,padding:'12px 0',borderBottom:i<1?'1px solid var(--border-1)':'none'}}>
        <span style={{width:24,height:24,flexShrink:0,borderRadius:999,background:i?'var(--bg-3)':'var(--accent)',color:i?'var(--fg-2)':'var(--accent-fg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-mono)',fontSize:10,fontWeight:600}}>{c[0][0].toUpperCase()}</span>
        <div><div style={{fontSize:13,fontWeight:600,color:'var(--fg-1)',marginBottom:2}}>{c[0]}</div><div style={{fontSize:13.5,color:'var(--fg-2)',lineHeight:1.5}}>{c[1]}</div></div>
      </div>)}
    </div>
  </div>;
}

function Phone({dark,setTheme}) {
  const [tab,setTab]=useState('home');
  const [story,setStory]=useState(null);
  const tabs=[['home','Top'],['flame','Hot'],['bell','Activity'],['user','You']];
  return <div style={{width:375,height:760,background:'var(--bg-0)',borderRadius:44,border:'10px solid #0b0d12',boxShadow:'var(--shadow-3)',overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}}>
    {/* status bar */}
    <div style={{height:44,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',flexShrink:0}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:600,color:'var(--fg-1)'}}>9:41</span>
      <div style={{width:110,height:26,background:'#0b0d12',borderRadius:999,position:'absolute',left:'50%',transform:'translateX(-50%)',top:8}}/>
      <div style={{display:'flex',gap:4,alignItems:'center',color:'var(--fg-1)'}}><span style={{fontFamily:'var(--font-mono)',fontSize:11}}>5G</span><div style={{width:22,height:11,border:'1.5px solid var(--fg-1)',borderRadius:3,padding:1}}><div style={{width:'70%',height:'100%',background:'var(--fg-1)',borderRadius:1}}/></div></div>
    </div>
    {/* app header */}
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 16px 12px',borderBottom:'1px solid var(--border-1)',flexShrink:0}}>
      <div style={{width:20,height:20,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:17,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Dispatch</span>
      <button onClick={()=>setTheme(!dark)} aria-label="theme" style={{marginLeft:'auto',width:36,height:36,display:'inline-flex',alignItems:'center',justifyContent:'center',border:'none',background:'transparent',color:'var(--fg-3)',cursor:'pointer'}}><Icon name={dark?'sun':'moon'} size={18}/></button>
    </div>
    {/* scroll body */}
    <div style={{flex:1,overflow:'auto'}}>{story?<Detail s={story} onBack={()=>setStory(null)}/>:<Feed onOpen={setStory}/>}</div>
    {/* tab bar */}
    <div style={{display:'flex',borderTop:'1px solid var(--border-1)',background:'var(--bg-1)',flexShrink:0,paddingBottom:8}}>
      {tabs.map(([ic,l])=>{const on=tab===ic;return <button key={ic} onClick={()=>{setTab(ic);setStory(null);}} style={{flex:1,height:52,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,border:'none',background:'transparent',cursor:'pointer',color:on?'var(--accent-subtle-fg)':'var(--fg-3)'}}><Icon name={ic} size={22} fill={on}/><span style={{fontSize:10,fontWeight:on?600:500,fontFamily:'var(--font-sans)'}}>{l}</span></button>;})}
    </div>
  </div>;
}

function App() {
  const [dark,setDark]=useState(false);
  const setTheme=(d)=>{setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  return <div style={{minHeight:'100vh',background:'var(--bg-2)',display:'flex',alignItems:'center',justifyContent:'center',gap:48,padding:'40px 20px',flexWrap:'wrap'}}>
    <Phone dark={dark} setTheme={setTheme}/>
    <div style={{maxWidth:280}}>
      <div style={{width:26,height:26,border:'2px solid var(--fg-1)',borderRadius:4,position:'relative',marginBottom:16}}><div style={{position:'absolute',inset:5,background:'var(--accent)',borderRadius:2}}/></div>
      <h1 style={{fontSize:26,fontWeight:700,letterSpacing:'-.02em',color:'var(--fg-1)',marginBottom:12}}>Dispatch for mobile</h1>
      <p style={{fontSize:14,color:'var(--fg-2)',lineHeight:1.6,marginBottom:16}}>The same system at 375px. Tap a story to open it, use the bottom tabs, and toggle the theme in the header — every hit target is at least 44px.</p>
      <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)',lineHeight:1.9}}><div>· 44px minimum touch targets</div><div>· dynamic-island status bar</div><div>· shared tokens · light + dark</div></div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function () {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    new Function('React', 'ReactDOM', out)(window.React, window.ReactDOM);
  })();
</script>
</body>
</html>
