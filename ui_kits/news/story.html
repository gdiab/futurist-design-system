<!-- @startingPoint section="News" subtitle="Story detail + comment thread" viewport="1280x900" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Dispatch · Story</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  #root{min-height:100vh;}
  a{text-decoration:none;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:999px;border:3px solid var(--bg-0);}
  /* Responsive layout: sidebar stacks below the article under 900px, prose takes full width. */
  .story-layout{max-width:1040px;margin:0 auto;padding:32px 28px;display:grid;grid-template-columns:1fr 220px;gap:36px;align-items:start;}
  .story-aside{position:sticky;top:78px;}
  @media (max-width:900px){
    .story-layout{grid-template-columns:1fr;padding:24px 16px;gap:24px;}
    .story-aside{position:static;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState } = React;
const Ic = ({d,size=16,sw=1.7}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  up:<path d="M12 19V5M6 11l6-6 6 6"/>,
  chat:<path d="M21 12a8 8 0 01-11.5 7.2L3 21l1.8-6.5A8 8 0 1121 12z"/>,
  ext:<><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 14v5a1 1 0 01-1 1H5a1 1 0 01-1-1V7a1 1 0 011-1h5"/></>,
  back:<path d="M15 6l-6 6 6 6"/>,
  bookmark:<path d="M6 3h12a1 1 0 011 1v17l-7-4-7 4V4a1 1 0 011-1z"/>,
  share:<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></>,
  reply:<path d="M9 17l-5-5 5-5M4 12h11a5 5 0 015 5v1"/>,
  moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
  sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>,
};
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

/* Mechanical counter tick: old digits slide out, new digits slide in
   (--dur-base / --ease-standard). Width is pinned in ch + tabular figures
   so the roll never shifts layout. Reduced motion => instant swap. */
const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)');
function RollScore({value}) {
  const [roll,setRoll]=useState(null); // {from,to,dir,run}
  const prevRef=React.useRef(value);
  React.useLayoutEffect(()=>{
    const from=prevRef.current;
    if(from===value) return;
    prevRef.current=value;
    if(REDUCED_MOTION.matches){setRoll(null);return;}
    setRoll({from,to:value,dir:value>from?1:-1,run:false});
    const raf=requestAnimationFrame(()=>requestAnimationFrame(()=>setRoll(r=>r&&{...r,run:true})));
    const t=setTimeout(()=>setRoll(null),240);
    return ()=>{cancelAnimationFrame(raf);clearTimeout(t);};
  },[value]);
  const width=String(roll?Math.max(roll.from,roll.to):value).length+'ch';
  const rows=roll?(roll.dir===1?[roll.from,roll.to]:[roll.to,roll.from]):[value];
  const shift=roll?(roll.dir===1?(roll.run?-50:0):(roll.run?0:-50)):0;
  return <span style={{display:'inline-flex',flexDirection:'column',overflow:'hidden',height:'1em',minWidth:width,fontVariantNumeric:'tabular-nums'}}>
    <span className="roll-track" style={{display:'flex',flexDirection:'column',transform:'translateY('+shift+'%)',transition:roll?'transform var(--dur-base) var(--ease-standard)':'none'}}>
      {rows.map((n,i)=><span key={i} style={{height:'1em',lineHeight:1,textAlign:'center'}}>{n}</span>)}
    </span>
  </span>;
}

function Badge({tone='accent',children}) {
  const T={neutral:['var(--bg-3)','var(--fg-2)'],accent:['var(--accent-subtle)','var(--accent-subtle-fg)']}[tone];
  return <span style={{display:'inline-flex',alignItems:'center',height:18,padding:'0 7px',borderRadius:'var(--radius-sm)',fontFamily:'var(--font-mono)',fontSize:10,fontWeight:500,letterSpacing:'.05em',textTransform:'uppercase',background:T[0],color:T[1]}}>{children}</span>;
}
/* Avatars stay neutral — Signal Green is spent on actions and live state,
   not identity (the One Signal Rule). Authorship is marked with an OP badge. */
function Avatar({name,size=24}) {
  return <div style={{width:size,height:size,borderRadius:'var(--radius-full)',background:'var(--bg-3)',border:'1px solid var(--border-2)',color:'var(--fg-2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'var(--font-mono)',fontSize:size*0.42,fontWeight:600}}>{name.slice(0,1).toUpperCase()}</div>;
}
const OP='kira_v'; /* story author — comments by them carry the OP badge */

const comments = [
  {a:"lin.dev",t:"14m",pts:64,body:"The 0.7ms median is impressive, but I'd love to see the tail. What does p99.9 look like under a noisy-neighbor scenario? GC-free doesn't help if the allocator fragments.",kids:[
    {a:"kira_v",t:"9m",pts:41,body:"Fair — p99.9 sits around 3.1ms today. We use a slab allocator with per-core arenas, so fragmentation stays bounded. Full histogram is in the appendix.",kids:[
      {a:"lin.dev",t:"6m",pts:12,body:"Per-core arenas, nice. That explains the flat curve. Subscribed.",kids:[]}
    ]}
  ]},
  {a:"corbet",t:"22m",pts:38,body:"Zig's comptime is underrated for this class of problem. Curious whether you considered Rust and what tipped the decision.",kids:[
    {a:"kira_v",t:"18m",pts:29,body:"We prototyped both. Rust won on ecosystem, Zig won on build times and C interop, which mattered because we embed into an existing C daemon. Close call.",kids:[]}
  ]},
  {a:"m. okafor",t:"31m",pts:17,body:"Deleting code is the best feeling in engineering. Congrats on the rewrite.",kids:[]},
];

function Comment({c,depth=0}) {
  const [pts,setPts]=useState(c.pts);
  const [voted,setVoted]=useState(false);
  const [collapsed,setCollapsed]=useState(false);
  const vote=()=>{setVoted(!voted);setPts(p=>voted?p-1:p+1);};
  return <div style={{marginLeft:depth?16:0,paddingLeft:depth?16:0,borderLeft:depth?'1px solid var(--border-1)':'none'}}>
    <div style={{padding:'12px 0'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <Avatar name={c.a} size={22}/>
        <span style={{fontSize:13,fontWeight:600,color:'var(--fg-1)'}}>{c.a}</span>
        {c.a===OP?<Badge>op</Badge>:null}
        <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>{c.t} ago</span>
        <button onClick={()=>setCollapsed(!collapsed)} aria-expanded={!collapsed} aria-label={(collapsed?'Expand':'Collapse')+' comment by '+c.a} style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)',border:'none',background:'transparent',cursor:'pointer',padding:'4px 8px',margin:'-4px -8px',borderRadius:'var(--radius-sm)'}}>[{collapsed?'+':'–'}]</button>
      </div>
      {!collapsed && <>
        <p style={{fontSize:13.5,color:'var(--fg-2)',lineHeight:1.6,margin:'0 0 8px 30px',maxWidth:'70ch'}}>{c.body}</p>
        <div style={{display:'flex',alignItems:'center',gap:16,marginLeft:30}}>
          <button onClick={vote} aria-pressed={voted} aria-label={`Upvote — ${pts} points`} style={{display:'inline-flex',alignItems:'center',gap:4,border:'none',borderRadius:'var(--radius-sm)',background:voted?'var(--accent-subtle)':'transparent',padding:'2px 6px',margin:'-2px -6px',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:11,fontWeight:600,color:voted?'var(--accent-subtle-fg)':'var(--fg-3)',transition:'background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard)'}}><Icon name="up" size={13} sw={voted?2.4:1.8}/><RollScore value={pts}/></button>
          <button style={{display:'inline-flex',alignItems:'center',gap:4,border:'none',background:'transparent',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}><Icon name="reply" size={12}/>Reply</button>
        </div>
        {c.kids.map((k,i)=><Comment key={i} c={k} depth={depth+1}/>)}
      </>}
    </div>
  </div>;
}

function App() {
  const [dark,setDark]=useState(false);
  const [pts,setPts]=useState(842);
  const [voted,setVoted]=useState(false);
  const [saved,setSaved]=useState(false);
  const setTheme=(d)=>{setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  const vote=()=>{setVoted(!voted);setPts(p=>voted?p-1:p+1);};
  const meta={display:'inline-flex',alignItems:'center',gap:5,fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'};
  /* Code panel stays dark in BOTH themes — --bg-inverse/--fg-inverse flip to
     near-white in dark mode, which would render a light panel inside the dark
     article. Pin the dark-theme token values (tokens/colors.css) instead. */
  const CODE_BG='oklch(0.22 0.012 260)', CODE_FG='oklch(0.965 0.003 258)';
  return <div style={{background:'var(--bg-0)',minHeight:'100vh'}}>
    <header style={{position:'sticky',top:0,zIndex:10,display:'flex',alignItems:'center',gap:16,height:54,padding:'0 28px',borderBottom:'1px solid var(--border-1)',background:'var(--surface-overlay)',backdropFilter:'blur(10px)'}}>
      <a href="index.html" style={{...meta,color:'var(--fg-2)',fontWeight:500}}><Icon name="back" size={15}/>Back to feed</a>
      <div style={{display:'flex',alignItems:'center',gap:9,marginLeft:6}}>
        <div style={{width:20,height:20,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
        <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Dispatch</span>
      </div>
      <button onClick={()=>setTheme(!dark)} aria-label="theme" style={{marginLeft:'auto',width:30,height:30,display:'inline-flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--border-1)',borderRadius:'var(--radius-md)',background:'transparent',color:'var(--fg-3)',cursor:'pointer'}}><Icon name={dark?'sun':'moon'} size={15}/></button>
    </header>

    <div className="story-layout">
      <main style={{minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
          <Badge>Show HN</Badge>
          <span style={{...meta,color:'var(--fg-3)'}}>Systems</span><span style={{color:'var(--fg-3)'}}>·</span>
          <span style={{...meta,color:'var(--fg-3)'}}>6 min read</span>
        </div>
        <h1 style={{fontSize:34,fontWeight:700,letterSpacing:'-.025em',lineHeight:1.15,color:'var(--fg-1)',marginBottom:16}}>A sub-millisecond time-series engine written in Zig</h1>
        <div style={{display:'flex',alignItems:'center',gap:12,paddingBottom:16,marginBottom:24,borderBottom:'1px solid var(--border-1)'}}>
          <Avatar name="kira_v" size={30}/>
          <div style={{display:'flex',flexDirection:'column'}}>
            <span style={{fontSize:13,fontWeight:600,color:'var(--fg-1)'}}>kira_v</span>
            <a href="#" style={{...meta,color:'var(--fg-3)'}}>github.com/futurist<Icon name="ext" size={11}/></a>
          </div>
          <span style={{...meta,color:'var(--fg-3)',marginLeft:'auto'}}>posted 2h ago</span>
        </div>

        <div style={{fontSize:15.5,color:'var(--fg-2)',lineHeight:1.72,maxWidth:'68ch'}}>
          <p style={{marginBottom:16}}>After two years fighting garbage-collection pauses in our Go-based metrics collector, we did the unthinkable and rewrote the ingest path in Zig. The result: median write latency dropped from <strong style={{color:'var(--fg-1)',fontWeight:600}}>4ms to 0.7ms</strong> at four million points per second. This is the architecture, the benchmarks, and an honest account of everything that broke along the way.</p>
          <h2 style={{fontSize:20,fontWeight:600,letterSpacing:'-.01em',color:'var(--fg-1)',margin:'28px 0 12px'}}>Why the GC had to go</h2>
          <p style={{marginBottom:16}}>Our old collector spent up to 18% of wall-clock time in stop-the-world pauses under load. For a system whose entire value proposition is "we never drop a sample," that was unacceptable. We profiled relentlessly, and the flame graphs kept pointing at the same wide, flat allocation frontier.</p>
          <blockquote style={{margin:'0 0 16px',padding:'4px 0 4px 20px',borderLeft:'1px solid var(--border-2)'}}>
            <p style={{margin:0,fontSize:17,lineHeight:1.55,fontStyle:'italic',letterSpacing:'-.01em',color:'var(--fg-1)'}}>“You cannot schedule your way out of an allocation problem. At some point you have to stop allocating.”</p>
          </blockquote>
          <p style={{marginBottom:16}}>The rewrite leans on a slab allocator with per-core arenas, so hot-path writes never touch a shared lock. Here's the core loop, trimmed for clarity:</p>
          <pre style={{background:CODE_BG,color:CODE_FG,padding:'12px 16px',borderRadius:'var(--radius-md)',fontFamily:'var(--font-mono)',fontSize:12.5,lineHeight:1.7,overflow:'auto',marginBottom:16}}>{`fn ingest(self: *Engine, batch: []const Point) !void {
    const arena = self.arenaForCore();
    for (batch) |p| {
        const slot = try arena.reserve(p.series);
        slot.append(p.ts, p.value); // lock-free
    }
}`}</pre>
          <p style={{marginBottom:16}}>The payoff shows up in the tail. p99.9 write latency now sits at 3.1ms even under a deliberately hostile noisy-neighbor benchmark — a number the old collector never came close to.</p>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:8,padding:'16px 0',margin:'8px 0 4px',borderTop:'1px solid var(--border-1)',borderBottom:'1px solid var(--border-1)'}}>
          <button onClick={vote} aria-pressed={voted} aria-label={`Upvote — ${pts} points`} style={{display:'inline-flex',alignItems:'center',gap:6,height:34,padding:'0 12px',borderRadius:'var(--radius-md)',border:'1px solid '+(voted?'var(--accent)':'var(--border-3)'),background:voted?'var(--accent-subtle)':'var(--bg-1)',color:voted?'var(--accent-subtle-fg)':'var(--fg-1)',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:13,fontWeight:600,transition:'background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard)'}}><Icon name="up" size={15} sw={voted?2.4:1.9}/><RollScore value={pts}/></button>
          <span style={{...meta}}><Icon name="chat" size={14}/>214 comments</span>
          <div style={{marginLeft:'auto',display:'flex',gap:6}}>
            <button onClick={()=>setSaved(!saved)} aria-pressed={saved} style={{display:'inline-flex',alignItems:'center',gap:6,height:34,padding:'0 12px',borderRadius:'var(--radius-md)',border:'1px solid var(--border-3)',background:'var(--bg-1)',color:saved?'var(--accent-subtle-fg)':'var(--fg-2)',cursor:'pointer',fontSize:13,fontWeight:500}}><Icon name="bookmark" size={14} sw={saved?2.2:1.7}/>{saved?'Saved':'Save'}</button>
            <button style={{display:'inline-flex',alignItems:'center',gap:6,height:34,padding:'0 12px',borderRadius:'var(--radius-md)',border:'1px solid var(--border-3)',background:'var(--bg-1)',color:'var(--fg-2)',cursor:'pointer',fontSize:13,fontWeight:500}}><Icon name="share" size={14}/>Share</button>
          </div>
        </div>

        {/* comment composer */}
        <div style={{margin:'20px 0 8px'}}>
          <textarea placeholder="Add a comment…" aria-label="Add a comment" rows={3} style={{width:'100%',padding:'10px 12px',background:'var(--bg-1)',border:'1px solid var(--border-3)',borderRadius:'var(--radius-md)',color:'var(--fg-1)',fontFamily:'var(--font-sans)',fontSize:13.5,lineHeight:1.5,outline:'none',resize:'vertical'}}></textarea>
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:8}}>
            <button style={{height:32,padding:'0 16px',border:'none',borderRadius:'var(--radius-md)',background:'var(--accent)',color:'var(--accent-fg)',fontSize:13,fontWeight:600,fontFamily:'var(--font-sans)',cursor:'pointer'}}>Comment</button>
          </div>
        </div>

        <div style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)',margin:'16px 0 4px'}}>214 comments · sorted by top</div>
        <div>{comments.map((c,i)=><Comment key={i} c={c}/>)}</div>
      </main>

      <aside className="story-aside" style={{display:'flex',flexDirection:'column',gap:16}}>
        <section style={{border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:'var(--bg-1)',padding:16,boxShadow:'var(--shadow-1)'}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)',marginBottom:12}}>Story stats</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[["Points",<RollScore value={pts}/>],["Comments","214"],["Rank","#1"],["Domain","github.com"]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--fg-3)'}}>{k}</span><span style={{fontFamily:'var(--font-mono)',color:'var(--fg-1)',fontWeight:500}}>{v}</span></div>)}
          </div>
        </section>
        <section style={{border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:'var(--bg-1)',padding:16,boxShadow:'var(--shadow-1)'}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)',marginBottom:12}}>More in Systems</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {["Rust in the Linux kernel: one year later","A field guide to reading flame graphs","io_uring in production: three gotchas"].map((t,i)=><a key={i} href="#" style={{fontSize:13,color:'var(--fg-1)',fontWeight:500,lineHeight:1.4}}>{t}</a>)}
          </div>
        </section>
      </aside>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function () {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    new Function('React', 'ReactDOM', out)(window.React, window.ReactDOM);
  })();
</script>
</body>
</html>
