<!-- @startingPoint section="Marketing" subtitle="Developer-tool landing page" viewport="1280x900" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Landing</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
#root{min-height:100vh;} a{ text-decoration:none; }
/* Blueprint hairline grid backdrop — tokenized, so it stays quiet in both themes. */
.grid-bg{position:relative;}
.grid-bg::before{
  content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
  background-image:
    linear-gradient(var(--border-1) 1px, transparent 1px),
    linear-gradient(90deg, var(--border-1) 1px, transparent 1px);
  background-size:48px 48px;
  -webkit-mask-image:radial-gradient(ellipse 85% 90% at 65% 0%, black 25%, transparent 78%);
  mask-image:radial-gradient(ellipse 85% 90% at 65% 0%, black 25%, transparent 78%);
}
/* Live-state pulse — duration collapses to instant under prefers-reduced-motion
   via the global wildcard guard in styles.css. */
@keyframes fz-pulse{0%,100%{opacity:1}50%{opacity:.25}}
.fz-live{animation:fz-pulse 2s var(--ease-in-out) infinite;}
/* Responsive collapse — desktop specs live in inline styles, so the
   breakpoint overrides need !important to win. Spacing stays on the 4px grid. */
@media (max-width:880px){
  .fz-nav-links{display:none !important;}
  .fz-hero,.fz-features,.fz-pricing{grid-template-columns:1fr !important;}
  .fz-hero{padding:var(--space-12) var(--space-10) var(--space-10) !important;gap:var(--space-8) !important;}
  .fz-features{gap:var(--space-8) !important;}
  .fz-pricing > div{border-left:none !important;}
  .fz-pricing > div + div{border-top:1px solid var(--border-1);}
  .fz-footer{flex-wrap:wrap;gap:var(--space-4) var(--space-6);}
}
@media (max-width:560px){
  .fz-nav{padding:0 var(--space-4) !important;gap:var(--space-4) !important;}
  .fz-h1{font-size:2.25rem !important;}
  .fz-hero{padding:var(--space-10) var(--space-4) var(--space-8) !important;}
  .fz-section{padding:var(--space-10) var(--space-4) !important;}
  .fz-footer{padding:var(--space-6) var(--space-4) !important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState } = React;

const Ic = ({ d, size=16, sw=1.7 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  zap:<path d="M13 2L4 14h7l-2 8 9-12h-7l2-8z"/>,
  shield:<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z"/>,
  gauge:<><path d="M12 14l4-4"/><path d="M4 18a8 8 0 1116 0"/><circle cx="12" cy="18" r="1.5"/></>,
  git:<><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="8" r="2.5"/><path d="M6 8.5v7M18 10.5c0 4-6 2-6 5.5"/></>,
  chevron:<path d="M9 6l6 6-6 6"/>,
  check:<path d="M4 12l5 5L20 6"/>,
  sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>,
  moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
};
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

function Btn({variant='primary',children,...r}) {
  const [h,setH]=useState(false);
  const V={primary:{background:h?'var(--accent-hover)':'var(--accent)',color:'var(--accent-fg)',border:'1px solid transparent'},secondary:{background:h?'var(--bg-2)':'var(--bg-1)',color:'var(--fg-1)',border:'1px solid var(--border-3)'}}[variant];
  return <button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',gap:8,height:40,padding:'0 18px',fontSize:14,fontWeight:500,fontFamily:'var(--font-sans)',borderRadius:'var(--radius-md)',cursor:'pointer',transition:'all var(--dur-fast)',...V}} {...r}>{children}</button>;
}
const Eyebrow = ({children}) => <span style={{fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--accent-subtle-fg)'}}>{children}</span>;

/* Dotted-leader status line — signature grammar (label ······ value). */
const Leader = () => <span aria-hidden="true" style={{flex:1,borderBottom:'1px dotted var(--border-3)',margin:'0 var(--space-2)',transform:'translateY(-3px)'}}/>;
const StatRow = ({k,v,color}) => <div style={{display:'flex',alignItems:'baseline',fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}}><span>{k}</span><Leader/><span style={{color:color||'var(--fg-2)'}}>{v}</span></div>;
const LiveDot = ({size=6}) => <span className="fz-live" style={{width:size,height:size,borderRadius:'50%',background:'var(--accent)',flex:'none'}}/>;

function ThemeButton() {
  const [dark,setDark]=useState(false);
  const [h,setH]=useState(false);
  const toggle=()=>{const d=!dark;setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  return <button aria-label="Theme" onClick={toggle} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:32,height:32,borderRadius:'var(--radius-md)',cursor:'pointer',border:'1px solid transparent',background:h?'var(--bg-2)':'transparent',color:h?'var(--fg-1)':'var(--fg-3)',transition:'all var(--dur-fast)'}}><Icon name={dark?'sun':'moon'} size={16}/></button>;
}

function Nav() {
  return <nav className="fz-nav" style={{position:'sticky',top:0,zIndex:10,display:'flex',alignItems:'center',gap:28,height:60,padding:'0 40px',borderBottom:'1px solid var(--border-1)',background:'var(--surface-overlay)',backdropFilter:'blur(10px)'}}>
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{width:22,height:22,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:16,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Futurist</span>
    </div>
    <div className="fz-nav-links" style={{display:'flex',gap:24,marginLeft:12}}>{['Product','Docs','Pricing','Changelog'].map(x=><a key={x} href="#" style={{fontSize:14,color:'var(--fg-2)',fontWeight:500}}>{x}</a>)}</div>
    <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
      <ThemeButton/>
      <a href="#" style={{fontSize:14,color:'var(--fg-2)',fontWeight:500}}>Sign in</a>
      <Btn variant="primary">Start free<Icon name="chevron" size={14}/></Btn>
    </div>
  </nav>;
}

function Hero() {
  return <section className="grid-bg" style={{position:'relative'}}><div className="fz-hero" style={{maxWidth:1200,margin:'0 auto',padding:'80px 40px 48px',display:'grid',gridTemplateColumns:'1.1fr 1fr',gap:48,alignItems:'start'}}>
    <div style={{display:'flex',flexDirection:'column',gap:20,paddingTop:16}}>
      <div style={{display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.08em',textTransform:'uppercase'}}>
        <LiveDot/>
        <span style={{color:'var(--accent-subtle-fg)',fontWeight:500}}>// telemetry platform</span>
        <span style={{color:'var(--fg-3)'}}>rev 2.4.0 — edge deploys</span>
      </div>
      <h1 className="fz-h1" style={{fontSize:56,fontWeight:600,letterSpacing:'-.02em',lineHeight:1.05,color:'var(--fg-1)'}}>Ship telemetry that keeps up with you.</h1>
      <p style={{fontSize:17,color:'var(--fg-2)',lineHeight:1.55,maxWidth:460}}>A precise, low-overhead observability layer for teams that measure everything. Metrics, traces, and logs — one dense console, zero noise.</p>
      <div style={{display:'flex',gap:12,marginTop:4}}>
        <Btn variant="primary">Deploy in 2 minutes<Icon name="chevron" size={14}/></Btn>
        <Btn variant="secondary">Read the docs</Btn>
      </div>
      <div style={{marginTop:12,maxWidth:360,display:'flex',flexDirection:'column',gap:8,paddingTop:16,borderTop:'1px solid var(--border-1)'}}>
        <StatRow k="ingest" v="4.2M spans/s"/>
        <StatRow k="uptime" v="99.99%"/>
        <StatRow k="compliance" v="SOC 2 type II"/>
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <Terminal/>
      <IngestStrip/>
    </div>
  </div></section>;
}

/* Live-feeling ingest readout under the terminal — CSS-drawn bar sparkline,
   fully tokenized (themes both ways), one Signal Green live bar. */
function IngestStrip() {
  const bars=[34,46,40,58,52,66,60,72,64,55,61,70,78,68,74,82,71,63,69,77,85,79,88,92];
  return <div style={{border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:'var(--bg-1)',padding:'12px 16px',display:'flex',alignItems:'center',gap:16}}>
    <div style={{display:'flex',alignItems:'flex-end',gap:3,height:28,flex:1}} aria-hidden="true">
      {bars.map((h,i)=><span key={i} className={i===bars.length-1?'fz-live':undefined} style={{flex:1,height:`${h}%`,borderRadius:1,background:i===bars.length-1?'var(--accent)':'var(--border-2)'}}/>)}
    </div>
    <div style={{display:'flex',alignItems:'baseline',gap:8,fontFamily:'var(--font-mono)',fontSize:12,whiteSpace:'nowrap'}}>
      <span style={{color:'var(--fg-3)',letterSpacing:'.08em',textTransform:'uppercase'}}>live ingest</span>
      <span style={{color:'var(--fg-1)'}}>4.19M/s</span>
    </div>
  </div>;
}

function Terminal() {
  /* Terminal chrome stays dark in BOTH themes — --bg-inverse flips to near-white
     in dark mode, which would produce a light terminal. Pin the light-theme
     inverse values instead; traffic lights + white hairline assume a dark bg.
     Foregrounds are pinned too: theme-relative tokens (--fg-3, --success, …)
     drop below AA against the pinned-dark bg in the light theme, so every
     terminal color is a local constant set to its dark-theme token value
     (tokens/colors.css [data-theme="dark"]) — the panel renders identically
     in both themes and each row clears 4.5:1. */
  const TERM_BG='oklch(0.22 0.012 260)', TERM_FG='oklch(0.97 0.003 255)',
        TERM_MUTED='oklch(0.655 0.010 260)',   /* dark --fg-3 */
        TERM_SUCCESS='oklch(0.680 0.130 168)', /* dark --success */
        TERM_WARNING='oklch(0.780 0.150 78)',  /* dark --warning */
        TERM_ACCENT='oklch(0.800 0.170 159)';  /* dark --accent */
  const rows=[
    ['$ ','futurist deploy --edge','',''],
    ['','→ building 6 services','',TERM_MUTED],
    ['','✓ api-gateway','142ms',TERM_SUCCESS],
    ['','✓ auth-service','98ms',TERM_SUCCESS],
    ['','✓ search-index','71ms',TERM_SUCCESS],
    ['','⚠ billing-worker','410ms',TERM_WARNING],
    ['','deployed to us-east-1, eu-west-1','',TERM_MUTED],
    ['$ ','','',''],
  ];
  return <div style={{background:TERM_BG,borderRadius:'var(--radius-xl)',boxShadow:'var(--shadow-3)',overflow:'hidden',border:'1px solid var(--border-2)'}}>
    <div style={{display:'flex',alignItems:'center',gap:6,padding:'11px 14px',borderBottom:'1px solid oklch(1 0 0 / 0.08)'}}>
      {['#ff5f57','#febc2e','#28c840'].map(c=><span key={c} style={{width:11,height:11,borderRadius:'50%',background:c,opacity:.9}}/>)}
      <span style={{marginLeft:8,fontFamily:'var(--font-mono)',fontSize:12,color:TERM_FG,opacity:.5}}>zsh — futurist</span>
    </div>
    <div style={{padding:'16px 18px',fontFamily:'var(--font-mono)',fontSize:13,lineHeight:1.85}}>
      {rows.map((r,i)=><div key={i} style={{display:'flex',color:r[3]||TERM_FG}}>
        <span style={{color:TERM_ACCENT}}>{r[0]}</span>
        <span style={{opacity:r[3]?1:.92}}>{r[1]}</span>
        {r[2]?<span style={{marginLeft:'auto',color:TERM_MUTED}}>{r[2]}</span>:null}
      </div>)}
    </div>
  </div>;
}

/* Blueprint-style inline SVG — the pipeline as an engineering drawing:
   hairline strokes, registration marks, dimension line, mono microlabels. */
function PipelineDiagram() {
  const mono={fontFamily:'var(--font-mono)',fontSize:9,letterSpacing:'.08em'};
  const reg=(x,y)=><g stroke="var(--border-3)" strokeWidth="1"><line x1={x-5} y1={y} x2={x+5} y2={y}/><line x1={x} y1={y-5} x2={x} y2={y+5}/></g>;
  const box=(x,label,w=84)=><g>
    <rect x={x} y="52" width={w} height="44" rx="3" fill="var(--bg-1)" stroke="var(--border-3)"/>
    <text x={x+w/2} y="46" textAnchor="middle" fill="var(--fg-3)" style={mono}>{label}</text>
  </g>;
  return <svg viewBox="0 0 400 150" role="img" aria-label="Pipeline diagram: agents to collector to console in under 800 milliseconds p99" style={{width:'100%',height:'auto',display:'block'}}>
    {reg(12,12)}{reg(388,12)}{reg(12,138)}{reg(388,138)}
    {box(28,'AGENTS')}{box(158,'COLLECTOR')}{box(288,'CONSOLE')}
    {/* source lines inside agents */}
    <g stroke="var(--border-2)" strokeWidth="1.5"><line x1="40" y1="66" x2="88" y2="66"/><line x1="40" y1="74" x2="76" y2="74"/><line x1="40" y1="82" x2="94" y2="82"/></g>
    {/* collector internals: index marks */}
    <g stroke="var(--border-2)" strokeWidth="1.5"><line x1="172" y1="66" x2="172" y2="82"/><line x1="182" y1="70" x2="182" y2="82"/><line x1="192" y1="62" x2="192" y2="82"/><line x1="202" y1="72" x2="202" y2="82"/><line x1="212" y1="66" x2="212" y2="82"/><line x1="222" y1="74" x2="222" y2="82"/></g>
    {/* console: live signal */}
    <circle className="fz-live" cx="304" cy="74" r="3.5" fill="var(--accent)"/>
    <text x="316" y="77.5" fill="var(--fg-2)" style={mono}>LIVE</text>
    {/* connectors with arrowheads */}
    <g stroke="var(--fg-3)" strokeWidth="1" fill="none">
      <line x1="112" y1="74" x2="152" y2="74"/><path d="M148 70l6 4-6 4"/>
      <line x1="242" y1="74" x2="282" y2="74"/><path d="M278 70l6 4-6 4"/>
    </g>
    {/* dimension line: agent → console latency */}
    <g stroke="var(--border-3)" strokeWidth="1">
      <line x1="112" y1="112" x2="372" y2="112"/><line x1="112" y1="107" x2="112" y2="117"/><line x1="372" y1="107" x2="372" y2="117"/>
    </g>
    <rect x="200" y="104" width="84" height="16" fill="var(--bg-0)"/>
    <text x="242" y="115.5" textAnchor="middle" fill="var(--fg-3)" style={mono}>&lt;800MS P99</text>
  </svg>;
}

function Features() {
  const feats=[
    ['01','Sub-second ingest','Spans land in your console in under 800ms p99, even at 4M events per second.','p99 · 780ms'],
    ['02','Dense by default','Every pixel earns its place. High-density tables, sparklines, and no chrome.','13px base grid'],
    ['03','Private by design','Bring your own keys. Data never leaves your region. SOC 2 Type II and HIPAA ready.','BYOK · SOC 2'],
    ['04','Deploy-aware','Correlate every metric spike with the commit and deploy that caused it.','sha ↔ span'],
  ];
  return <section style={{borderTop:'1px solid var(--border-1)'}}><div className="fz-section fz-features" style={{maxWidth:1200,margin:'0 auto',padding:'64px 40px',display:'grid',gridTemplateColumns:'1fr 1.2fr',gap:64,alignItems:'start'}}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <Eyebrow>// Why Futurist</Eyebrow>
      <h2 style={{fontSize:32,fontWeight:600,letterSpacing:'-.02em',lineHeight:1.15,color:'var(--fg-1)'}}>Built for precision, not dashboards-as-decoration.</h2>
      <p style={{fontSize:14,color:'var(--fg-2)',lineHeight:1.55,maxWidth:400}}>One path from instrumented code to a readable console. No sampling roulette, no seventeen-tab treasure hunt.</p>
      <div style={{marginTop:8,border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:'var(--bg-0)',padding:16}}>
        <PipelineDiagram/>
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column'}}>
      {feats.map((f,i)=><div key={i} style={{display:'grid',gridTemplateColumns:'44px 1fr',gap:16,padding:'20px 0',borderTop:'1px solid var(--border-1)'}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-4)',paddingTop:2}}>{f[0]}</span>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:16}}>
            <h3 style={{fontSize:16,fontWeight:600,color:'var(--fg-1)'}}>{f[1]}</h3>
            <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.05em',color:'var(--fg-3)',whiteSpace:'nowrap'}}>{f[3]}</span>
          </div>
          <p style={{fontSize:14,color:'var(--fg-2)',lineHeight:1.55,maxWidth:520}}>{f[2]}</p>
        </div>
      </div>)}
      <div style={{borderTop:'1px solid var(--border-1)'}}/>
    </div>
  </div></section>;
}

function Pricing() {
  const plans=[
    ['Hobby','$0',['1 project','7-day retention','Community support'],false],
    ['Team','$40',['Unlimited projects','90-day retention','Deploy correlation','Priority support'],true],
    ['Enterprise','Custom',['SSO & SAML','Unlimited retention','On-prem / BYOK','Dedicated SLA'],false],
  ];
  return <section className="fz-section" style={{maxWidth:1200,margin:'0 auto',padding:'64px 40px'}}>
    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:32,maxWidth:520}}>
      <Eyebrow>// Pricing</Eyebrow>
      <h2 style={{fontSize:32,fontWeight:600,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Priced per seat, not per surprise.</h2>
    </div>
    <div className="fz-pricing" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:'var(--bg-1)',overflow:'hidden'}}>
      {plans.map((p,i)=><div key={i} style={{padding:24,display:'flex',flexDirection:'column',gap:16,borderLeft:i?'1px solid var(--border-1)':'none',background:p[3]?'var(--bg-2)':'transparent'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.08em',textTransform:'uppercase'}}>
          <span style={{color:'var(--fg-3)'}}>// {p[0]}</span>
          {p[3]?<span style={{display:'inline-flex',alignItems:'center',gap:6,color:'var(--accent-subtle-fg)',marginLeft:'auto'}}><LiveDot size={5}/>recommended</span>:null}
        </div>
        <div style={{display:'flex',alignItems:'baseline',gap:4}}><span style={{fontFamily:'var(--font-mono)',fontSize:32,fontWeight:500,color:'var(--fg-1)'}}>{p[1]}</span>{p[1]!=='Custom'?<span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--fg-3)'}}>/mo</span>:null}</div>
        <div style={{display:'flex',flexDirection:'column',gap:8,paddingTop:12,borderTop:'1px solid var(--border-1)'}}>{p[2].map((f,j)=><div key={j} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--fg-2)'}}><span style={{color:'var(--accent-subtle-fg)',display:'inline-flex'}}><Icon name="check" size={15}/></span>{f}</div>)}</div>
        <Btn variant={p[3]?'primary':'secondary'} style={{width:'100%',justifyContent:'center',marginTop:'auto'}}>{p[1]==='Custom'?'Contact sales':'Get started'}</Btn>
      </div>)}
    </div>
  </section>;
}

function Footer() {
  return <footer style={{borderTop:'1px solid var(--border-1)',background:'var(--bg-1)'}}><div className="fz-footer" style={{maxWidth:1200,margin:'0 auto',padding:'32px 40px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
    <div style={{display:'flex',alignItems:'center',gap:9}}>
      <div style={{width:18,height:18,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:3,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}}>© 2026 Futurist Labs</span>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}}>
      <LiveDot size={5}/><span>status</span><span aria-hidden="true" style={{color:'var(--fg-4)'}}>········</span><span style={{color:'var(--fg-2)'}}>operational</span>
    </div>
    <div style={{display:'flex',gap:20}}>{['Status','Security','Terms','Privacy'].map(x=><a key={x} href="#" style={{fontSize:13,color:'var(--fg-3)'}}>{x}</a>)}</div>
  </div></footer>;
}

function App(){return <div style={{background:'var(--bg-0)'}}><Nav/><Hero/><Features/><Pricing/><Footer/></div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function () {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    new Function('React', 'ReactDOM', out)(window.React, window.ReactDOM);
  })();
</script>
</body>
</html>
