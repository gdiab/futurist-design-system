<!-- @dsCard group="Marketing" viewport="1280x820" -->
<!-- @startingPoint section="Marketing" subtitle="Developer-tool landing page" viewport="1280x900" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Landing</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
#root{min-height:100vh;} a{ text-decoration:none; }
/* Blueprint hairline grid backdrop — tokenized, so it stays quiet in both themes. */
.grid-bg{position:relative;}
.grid-bg::before{
  content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
  background-image:
    linear-gradient(var(--border-1) 1px, transparent 1px),
    linear-gradient(90deg, var(--border-1) 1px, transparent 1px);
  background-size:48px 48px;
  -webkit-mask-image:radial-gradient(ellipse 85% 90% at 65% 0%, black 25%, transparent 78%);
  mask-image:radial-gradient(ellipse 85% 90% at 65% 0%, black 25%, transparent 78%);
}
/* Panel variant — pinned faint white grid for the dark hero panel (part of the
   pinned-panel exception; theme hairlines would vanish against the pinned bg). */
.grid-bg-panel{position:relative;}
.grid-bg-panel::before{
  content:""; position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(oklch(1 0 0 / 0.045) 1px, transparent 1px),
    linear-gradient(90deg, oklch(1 0 0 / 0.045) 1px, transparent 1px);
  background-size:48px 48px;
  -webkit-mask-image:radial-gradient(ellipse 85% 90% at 65% 0%, black 25%, transparent 78%);
  mask-image:radial-gradient(ellipse 85% 90% at 65% 0%, black 25%, transparent 78%);
}
/* Live-state pulse — duration collapses to instant under prefers-reduced-motion
   via the global wildcard guard in styles.css. */
@keyframes fz-pulse{0%,100%{opacity:1}50%{opacity:.25}}
.fz-live{animation:fz-pulse 2s var(--ease-in-out) infinite;}
/* Terminal cursor — mechanical 1s step blink. step-end keyframe, so the global
   reduced-motion guard above freezes it to steady-on (0% state = visible). */
@keyframes fz-blink{0%{opacity:1}50%{opacity:0}}
.fz-cursor{animation:fz-blink 1s step-end infinite;}
/* Responsive collapse — desktop specs live in inline styles, so the
   breakpoint overrides need !important to win. Spacing stays on the 4px grid. */
/* Mobile menu button + disclosure panel — desktop hides both */
.fz-menu-btn{display:none;}
/* Mobile pricing — the spec-sheet table swaps for stacked plan panels ≤560px
   (recommended plan first); a wide scroller would hide the Team column. */
.fz-price-stack{display:none;}
@media (min-width:881px){
  .fz-menu-panel{display:none !important;}
}
@media (max-width:880px){
  .fz-nav-links{display:none !important;}
  .fz-menu-btn{display:inline-flex;}
  .fz-hero,.fz-features{grid-template-columns:1fr !important;}
  .fz-hero{padding:var(--space-12) var(--space-10) var(--space-12) !important;gap:var(--space-8) !important;}
  .fz-features{gap:var(--space-8) !important;}
  .fz-stat-band{grid-template-columns:1fr !important;}
  .fz-stat-band > div{border-left:none !important;padding-left:0 !important;}
  .fz-reg{display:none !important;}
  .fz-footer{flex-wrap:wrap;gap:var(--space-4) var(--space-6);}
}
@media (max-width:560px){
  .fz-nav{padding:0 var(--space-4) !important;gap:var(--space-4) !important;}
  .fz-nav-signin{display:none;} /* reachable via the menu panel */
  .fz-h1{font-size:2.25rem !important;}
  .fz-hero{padding:var(--space-10) var(--space-4) var(--space-10) !important;}
  .fz-section{padding:var(--space-10) var(--space-4) !important;}
  .fz-stat-band{padding:var(--space-5) var(--space-4) !important;}
  .fz-footer{padding:var(--space-6) var(--space-4) !important;}
  .fz-spec-wrap{display:none !important;}
  .fz-price-stack{display:flex;flex-direction:column;gap:var(--space-4);}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState } = React;

const Ic = ({ d, size=16, sw=1.7 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  zap:<path d="M13 2L4 14h7l-2 8 9-12h-7l2-8z"/>,
  shield:<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z"/>,
  gauge:<><path d="M12 14l4-4"/><path d="M4 18a8 8 0 1116 0"/><circle cx="12" cy="18" r="1.5"/></>,
  git:<><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="8" r="2.5"/><path d="M6 8.5v7M18 10.5c0 4-6 2-6 5.5"/></>,
  chevron:<path d="M9 6l6 6-6 6"/>,
  check:<path d="M4 12l5 5L20 6"/>,
  sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>,
  moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
  menu:<path d="M4 7h16M4 12h16M4 17h16"/>,
  close:<path d="M6 6l12 12M18 6L6 18"/>,
};
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

function Btn({variant='primary',children,style,...r}) {
  const [h,setH]=useState(false);
  const V={primary:{background:h?'var(--accent-hover)':'var(--accent)',color:'var(--accent-fg)',border:'1px solid transparent'},secondary:{background:h?'var(--bg-2)':'var(--bg-1)',color:'var(--fg-1)',border:'1px solid var(--border-3)'}}[variant];
  return <button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,height:40,padding:'0 18px',fontSize:14,fontWeight:500,fontFamily:'var(--font-sans)',borderRadius:'var(--radius-md)',cursor:'pointer',transition:'all var(--dur-fast)',...V,...style}} {...r}>{children}</button>;
}
const Eyebrow = ({children}) => <span style={{fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--accent-subtle-fg)'}}>{children}</span>;

/* Dotted-leader status line — signature grammar (label ······ value).
   Color props exist so the same grammar can run on the pinned-dark panel. */
const Leader = ({dots}) => <span aria-hidden="true" style={{flex:1,borderBottom:`1px dotted ${dots||'var(--border-3)'}`,margin:'0 var(--space-2)',transform:'translateY(-3px)'}}/>;
const StatRow = ({k,v,color,labelColor,dots}) => <div style={{display:'flex',alignItems:'baseline',fontFamily:'var(--font-mono)',fontSize:12,color:labelColor||'var(--fg-3)'}}><span>{k}</span><Leader dots={dots}/><span style={{color:color||'var(--fg-2)'}}>{v}</span></div>;
const LiveDot = ({size=6}) => <span className="fz-live" style={{width:size,height:size,borderRadius:'50%',background:'var(--accent)',flex:'none'}}/>;

/* ── The instrument panel ────────────────────────────────────────────
   The hero pins the dark-theme palette in BOTH themes (the sanctioned
   pinned-panel exception, same as the readout and blueprint inside it):
   in light theme it reads as a committed dark drench; in dark theme it
   sits flush with the canvas. Every value below is its dark-theme token
   from tokens/colors.css — foregrounds included, so text clears AA
   against the pinned background in both themes. */
const PANEL = {
  bg:     'oklch(0.22 0.012 260)',   /* --bg-inverse (light theme)   */
  inset:  'oklch(0.175 0.008 262)',  /* dark --bg-0 — readout well   */
  fg1:    'oklch(0.965 0.003 258)',  /* dark --fg-1                  */
  fg2:    'oklch(0.800 0.008 258)',  /* dark --fg-2                  */
  muted:  'oklch(0.655 0.010 260)',  /* dark --fg-3 — 5.5:1 on bg    */
  hair:   'oklch(1 0 0 / 0.10)',     /* hairline on the panel        */
  dots:   'oklch(1 0 0 / 0.28)',     /* dotted leaders on the panel  */
  bar:    'oklch(1 0 0 / 0.22)',     /* inactive sparkline bars      */
  accent: 'oklch(0.800 0.170 159)',  /* dark --accent                */
  success:'oklch(0.680 0.130 168)',  /* dark --success               */
  warning:'oklch(0.780 0.150 78)',   /* dark --warning               */
};

/* Corner registration mark — the blueprint grammar, machined into the panel. */
const RegMark = ({style}) => <svg className="fz-reg" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true" style={{position:'absolute',...style}}><g stroke={PANEL.dots} strokeWidth="1"><line x1="0" y1="6" x2="12" y2="6"/><line x1="6" y1="0" x2="6" y2="12"/></g></svg>;

function ThemeButton() {
  const [dark,setDark]=useState(false);
  const [h,setH]=useState(false);
  const toggle=()=>{const d=!dark;setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  return <button aria-label="Theme" onClick={toggle} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:32,height:32,borderRadius:'var(--radius-md)',cursor:'pointer',border:'1px solid transparent',background:h?'var(--bg-2)':'transparent',color:h?'var(--fg-1)':'var(--fg-3)',transition:'all var(--dur-fast)'}}><Icon name={dark?'sun':'moon'} size={16}/></button>;
}

function Nav() {
  /* Mobile menu — below 880px the inline links hide, so a disclosure panel
     keeps Product/Docs/Pricing/Changelog reachable. Escape closes and
     returns focus to the button. */
  const [open,setOpen]=useState(false);
  React.useEffect(()=>{
    if(!open) return;
    const onKey=(e)=>{if(e.key==='Escape'){setOpen(false);const b=document.getElementById('fz-menu-btn');if(b)b.focus();}};
    document.addEventListener('keydown',onKey);
    return ()=>document.removeEventListener('keydown',onKey);
  },[open]);
  const links=['Product','Docs','Pricing','Changelog'];
  return <nav className="fz-nav" style={{position:'sticky',top:0,zIndex:10,display:'flex',alignItems:'center',gap:28,height:60,padding:'0 40px',borderBottom:'1px solid var(--border-1)',background:'var(--surface-overlay)',backdropFilter:'blur(10px)'}}>
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{width:22,height:22,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:16,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Futurist</span>
    </div>
    <div className="fz-nav-links" style={{display:'flex',gap:24,marginLeft:12}}>{links.map(x=><a key={x} href="#" style={{fontSize:14,color:'var(--fg-2)',fontWeight:500}}>{x}</a>)}</div>
    <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
      <ThemeButton/>
      <a href="#" className="fz-nav-signin" style={{fontSize:14,color:'var(--fg-2)',fontWeight:500}}>Sign in</a>
      <Btn variant="primary">Start free<Icon name="chevron" size={14}/></Btn>
      <button id="fz-menu-btn" className="fz-menu-btn" aria-label="Menu" aria-expanded={open} aria-controls="fz-mobile-menu" onClick={()=>setOpen(!open)} style={{alignItems:'center',justifyContent:'center',width:40,height:40,margin:'0 -8px 0 -4px',borderRadius:'var(--radius-md)',cursor:'pointer',border:'1px solid transparent',background:'transparent',color:'var(--fg-1)'}}><Icon name={open?'close':'menu'} size={18}/></button>
    </div>
    {open&&<div id="fz-mobile-menu" className="fz-menu-panel" style={{position:'absolute',top:'100%',left:0,right:0,display:'flex',flexDirection:'column',padding:'var(--space-2) var(--space-4)',background:'var(--bg-1)',borderBottom:'1px solid var(--border-1)',boxShadow:'var(--shadow-2)'}}>
      {links.concat(['Sign in']).map(x=><a key={x} href="#" onClick={()=>setOpen(false)} style={{display:'flex',alignItems:'center',minHeight:44,fontSize:15,color:'var(--fg-1)',fontWeight:500,borderBottom:'1px solid var(--border-1)'}}>{x}</a>)}
      <div style={{padding:'var(--space-3) 0 var(--space-2)'}}><Btn variant="primary" style={{width:'100%'}}>Start free<Icon name="chevron" size={14}/></Btn></div>
    </div>}
  </nav>;
}

function Hero() {
  /* v2: the hero's primary object is the pipeline blueprint — the "what is
     this" answer in the first viewport. The stat band moved to the light
     canvas (StatBand) so the panel no longer carries the dark-stats-strip
     silhouette. */
  return <section className="grid-bg-panel" style={{position:'relative',background:PANEL.bg}}>
    <div style={{maxWidth:1200,margin:'0 auto',position:'relative'}}>
      <RegMark style={{top:28,left:28}}/><RegMark style={{top:28,right:28}}/>
      <RegMark style={{bottom:28,left:28}}/><RegMark style={{bottom:28,right:28}}/>
      <div className="fz-hero" style={{padding:'88px 40px 80px',display:'grid',gridTemplateColumns:'1.1fr 1fr',gap:48,alignItems:'center'}}>
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.08em',textTransform:'uppercase'}}>
            <LiveDot/>
            <span style={{color:PANEL.accent,fontWeight:500}}>// telemetry platform</span>
            <span style={{color:PANEL.muted}}>rev 2.4.0 — edge deploys</span>
          </div>
          <h1 className="fz-h1" style={{fontSize:62,fontWeight:600,letterSpacing:'-.02em',lineHeight:1.04,color:PANEL.fg1}}>Ship telemetry that keeps up with you.</h1>
          <p style={{fontSize:17,color:PANEL.fg2,lineHeight:1.55,maxWidth:460}}>A precise, low-overhead observability layer for teams that measure everything. Metrics, traces, and logs — one dense console, zero noise.</p>
          <div style={{display:'flex',gap:12,marginTop:4}}>
            <Btn variant="primary">Deploy in 2 minutes<Icon name="chevron" size={14}/></Btn>
            <Btn variant="secondary">Read the docs</Btn>
          </div>
        </div>
        <PipelinePanel/>
      </div>
    </div>
  </section>;
}

/* The hero blueprint — the pipeline as an engineering drawing, milled into
   the panel: hairline strokes, registration marks, dimension line, mono
   microlabels. All strokes are pinned dark-theme values (PANEL), because
   theme-relative tokens would vanish against the pinned background. */
function PipelinePanel() {
  return <div style={{background:PANEL.inset,borderRadius:'var(--radius-lg)',border:`1px solid ${PANEL.hair}`,overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderBottom:`1px solid ${PANEL.hair}`,fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.08em',textTransform:'uppercase'}}>
      <LiveDot size={5}/>
      <span style={{color:PANEL.muted}}>pipeline — agent to console</span>
      <span style={{marginLeft:'auto',color:PANEL.muted}}>us-east-1</span>
    </div>
    <div style={{padding:'24px 22px 16px'}}><PipelineDiagram/></div>
  </div>;
}

function PipelineDiagram() {
  const mono={fontFamily:'var(--font-mono)',fontSize:9,letterSpacing:'.08em'};
  const reg=(x,y)=><g stroke={PANEL.dots} strokeWidth="1"><line x1={x-5} y1={y} x2={x+5} y2={y}/><line x1={x} y1={y-5} x2={x} y2={y+5}/></g>;
  const box=(x,label,w=84)=><g>
    <rect x={x} y="52" width={w} height="44" rx="3" fill={PANEL.bg} stroke={PANEL.dots}/>
    <text x={x+w/2} y="46" textAnchor="middle" fill={PANEL.muted} style={mono}>{label}</text>
  </g>;
  return <svg viewBox="0 0 400 150" role="img" aria-label="Pipeline diagram: agents to collector to console in under 800 milliseconds p99" style={{width:'100%',height:'auto',display:'block'}}>
    {reg(12,12)}{reg(388,12)}{reg(12,138)}{reg(388,138)}
    {box(28,'AGENTS')}{box(158,'COLLECTOR')}{box(288,'CONSOLE')}
    {/* source lines inside agents */}
    <g stroke={PANEL.bar} strokeWidth="1.5"><line x1="40" y1="66" x2="88" y2="66"/><line x1="40" y1="74" x2="76" y2="74"/><line x1="40" y1="82" x2="94" y2="82"/></g>
    {/* collector internals: index marks */}
    <g stroke={PANEL.bar} strokeWidth="1.5"><line x1="172" y1="66" x2="172" y2="82"/><line x1="182" y1="70" x2="182" y2="82"/><line x1="192" y1="62" x2="192" y2="82"/><line x1="202" y1="72" x2="202" y2="82"/><line x1="212" y1="66" x2="212" y2="82"/><line x1="222" y1="74" x2="222" y2="82"/></g>
    {/* console: live signal */}
    <circle className="fz-live" cx="304" cy="74" r="3.5" fill={PANEL.accent}/>
    <text x="316" y="77.5" fill={PANEL.fg2} style={mono}>LIVE</text>
    {/* connectors with arrowheads */}
    <g stroke={PANEL.muted} strokeWidth="1" fill="none">
      <line x1="112" y1="74" x2="152" y2="74"/><path d="M148 70l6 4-6 4"/>
      <line x1="242" y1="74" x2="282" y2="74"/><path d="M278 70l6 4-6 4"/>
    </g>
    {/* dimension line: agent → console latency */}
    <g stroke={PANEL.dots} strokeWidth="1">
      <line x1="112" y1="112" x2="372" y2="112"/><line x1="112" y1="107" x2="112" y2="117"/><line x1="372" y1="107" x2="372" y2="117"/>
    </g>
    <rect x="200" y="104" width="84" height="16" fill={PANEL.inset}/>
    <text x="242" y="115.5" textAnchor="middle" fill={PANEL.muted} style={mono}>&lt;800MS P99</text>
  </svg>;
}

/* The deploy readout — no window chrome, no traffic lights: this is not a
   picture of a terminal, it is a readout milled into the instrument panel.
   v2: demoted from the hero to the features column, where it illustrates
   the deploy-aware story at reduced width. Colors stay pinned (PANEL) —
   a dark instrument block recessed into the light canvas.
   Replay-on-load: rows render visible by default; JS hides them only after
   mount and only when motion is allowed, then reveals top-to-bottom at a
   mechanical cadence (visibility swap — no slide, no typewriter). The ⚠ row
   holds an extra beat. Runs once; reduced motion or JS failure = full static
   transcript. */
function DeployReadout() {
  const rows=[
    ['$ ','futurist deploy --edge','',''],
    ['','→ building 6 services','',PANEL.muted],
    ['','✓ api-gateway','142ms',PANEL.success],
    ['','✓ auth-service','98ms',PANEL.success],
    ['','✓ search-index','71ms',PANEL.success],
    ['','⚠ billing-worker','410ms',PANEL.warning],
    ['','deployed to us-east-1, eu-west-1','',PANEL.muted],
    ['$ ','','',''],
  ];
  const bars=[34,46,40,58,52,66,60,72,64,55,61,70,78,68,74,82,71,63,69,77,85,79,88,92];
  const [shown,setShown]=useState(rows.length);
  React.useEffect(()=>{
    let allow=false;
    try{allow=!window.matchMedia('(prefers-reduced-motion: reduce)').matches;}catch(e){}
    if(!allow)return;
    setShown(0);
    const timers=[];let t=180;
    rows.forEach((r,i)=>{
      if(r[1].charAt(0)==='⚠')t+=300;
      timers.push(setTimeout(()=>setShown(i+1),t));
      t+=160;
    });
    return ()=>timers.forEach(clearTimeout);
  },[]);
  return <div style={{background:PANEL.inset,borderRadius:'var(--radius-lg)',border:`1px solid ${PANEL.hair}`,overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderBottom:`1px solid ${PANEL.hair}`,fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.08em',textTransform:'uppercase'}}>
      <LiveDot size={5}/>
      <span style={{color:PANEL.muted}}>deploy — rev 2.4.0</span>
      <span style={{marginLeft:'auto',color:PANEL.muted}}>us-east-1</span>
    </div>
    <div style={{padding:'16px 18px',fontFamily:'var(--font-mono)',fontSize:13,lineHeight:1.85}}>
      {rows.map((r,i)=><div key={i} className="fz-term-row" style={{display:'flex',color:r[3]||PANEL.fg1,visibility:i<shown?'visible':'hidden'}}>
        <span style={{color:PANEL.accent}}>{r[0]}</span>
        <span style={{opacity:r[3]?1:.92}}>{r[1]}</span>
        {i===rows.length-1?<span className="fz-cursor" aria-hidden="true" style={{width:8,height:15,background:PANEL.fg1,alignSelf:'center'}}/>:null}
        {r[2]?<span style={{marginLeft:'auto',color:PANEL.muted}}>{r[2]}</span>:null}
      </div>)}
    </div>
    <div style={{display:'flex',alignItems:'center',gap:16,padding:'12px 16px',borderTop:`1px solid ${PANEL.hair}`}}>
      <div style={{display:'flex',alignItems:'flex-end',gap:3,height:28,flex:1}} aria-hidden="true">
        {bars.map((h,i)=><span key={i} className={i===bars.length-1?'fz-live':undefined} style={{flex:1,height:`${h}%`,borderRadius:1,background:i===bars.length-1?PANEL.accent:PANEL.bar}}/>)}
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:8,fontFamily:'var(--font-mono)',fontSize:12,whiteSpace:'nowrap'}}>
        <span style={{color:PANEL.muted,letterSpacing:'.08em',textTransform:'uppercase'}}>live ingest</span>
        <span style={{color:PANEL.fg1}}>4.19M/s</span>
      </div>
    </div>
  </div>;
}

function Features() {
  const feats=[
    ['zap','Sub-second ingest','Spans land in your console in under 800ms p99, even at 4M events per second.','p99 · 780ms'],
    ['gauge','Dense by default','Every pixel earns its place. High-density tables, sparklines, and no chrome.','13px base grid'],
    ['shield','Private by design','Bring your own keys. Data never leaves your region. SOC 2 Type II and HIPAA ready.','BYOK · SOC 2'],
    ['git','Deploy-aware','Correlate every metric spike with the commit and deploy that caused it.','sha ↔ span'],
  ];
  return <section style={{borderTop:'1px solid var(--border-1)'}}><div className="fz-section fz-features" style={{maxWidth:1200,margin:'0 auto',padding:'64px 40px',display:'grid',gridTemplateColumns:'1fr 1.2fr',gap:64,alignItems:'start'}}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <Eyebrow>// Why Futurist</Eyebrow>
      <h2 style={{fontSize:32,fontWeight:600,letterSpacing:'-.02em',lineHeight:1.15,color:'var(--fg-1)'}}>Built for precision, not dashboards-as-decoration.</h2>
      <p style={{fontSize:14,color:'var(--fg-2)',lineHeight:1.55,maxWidth:400}}>One path from instrumented code to a readable console. No sampling roulette, no seventeen-tab treasure hunt.</p>
      {/* v2: the readout lives here — the deploy-aware proof, at reduced width. */}
      <div style={{marginTop:8}}>
        <DeployReadout/>
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column'}}>
      {feats.map((f,i)=><div key={i} style={{display:'grid',gridTemplateColumns:'44px 1fr',gap:16,padding:'20px 0',borderTop:'1px solid var(--border-1)'}}>
        <span style={{display:'inline-flex',color:'var(--fg-3)',paddingTop:2}} aria-hidden="true"><Icon name={f[0]} size={18}/></span>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:16}}>
            <h3 style={{fontSize:16,fontWeight:600,color:'var(--fg-1)'}}>{f[1]}</h3>
            <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.05em',color:'var(--fg-3)',whiteSpace:'nowrap'}}>{f[3]}</span>
          </div>
          <p style={{fontSize:14,color:'var(--fg-2)',lineHeight:1.55,maxWidth:520}}>{f[2]}</p>
        </div>
      </div>)}
      <div style={{borderTop:'1px solid var(--border-1)'}}/>
    </div>
  </div></section>;
}

/* v2: the machined stat band, re-set on the light canvas — same dotted-leader
   grammar, theme tokens instead of pinned panel values. Quiet, between the
   argument (features) and the decision (pricing). */
function StatBand() {
  return <section style={{borderTop:'1px solid var(--border-1)'}}>
    <div className="fz-stat-band" style={{maxWidth:1200,margin:'0 auto',padding:'24px 40px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px 0'}}>
      <div style={{paddingRight:32}}><StatRow k="ingest" v="4.2M spans/s"/></div>
      <div style={{borderLeft:'1px solid var(--border-1)',padding:'0 32px'}}><StatRow k="uptime" v="99.99%"/></div>
      <div style={{borderLeft:'1px solid var(--border-1)',paddingLeft:32}}><StatRow k="compliance" v="SOC 2 Type II"/></div>
    </div>
  </section>;
}

/* Pricing as a spec sheet — data tables are the system's home turf, so the
   plans are presented as a machined specification table: mono values,
   hairline rows, uppercase mono row labels, — for absent, ✓ for included.
   The recommended column carries an --accent-subtle tint (selection grammar).
   v2: two plans in the table; Enterprise is a single hairline row beneath it,
   so the sheet stops reading as the 3-tier template. */
function Pricing() {
  const cols=[
    {name:'Hobby', price:'$0',  per:'/mo', cta:'Get started', primary:false, rec:false},
    {name:'Team',  price:'$40', per:'/mo', cta:'Get started', primary:true,  rec:true},
  ];
  const specs=[
    ['projects',['1','Unlimited']],
    ['retention',['7 days','90 days']],
    ['deploy correlation',[null,true]],
    ['support',['Community','Priority']],
  ];
  const rowLabel={fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--fg-3)',textAlign:'left',padding:'14px 24px',whiteSpace:'nowrap'};
  const cellStyle=(rec)=>({padding:'14px 24px',borderLeft:'1px solid var(--border-1)',background:rec?'var(--accent-subtle)':'transparent'});
  const cell=(v,rec)=>
    v===true ? <span style={{color:'var(--accent-subtle-fg)',display:'inline-flex'}} aria-label="included"><Icon name="check" size={15}/></span> :
    v===null ? <span style={{color:rec?'var(--fg-2)':'var(--fg-3)'}} aria-label="not included">—</span> :
    <span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--fg-1)'}}>{v}</span>;
  return <section className="fz-section" style={{maxWidth:1200,margin:'0 auto',padding:'64px 40px'}}>
    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:32,maxWidth:520}}>
      <Eyebrow>// Pricing</Eyebrow>
      <h2 style={{fontSize:32,fontWeight:600,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Priced per seat, not per surprise.</h2>
    </div>
    <div className="fz-spec-wrap" style={{border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:'var(--bg-1)',overflowX:'auto'}}>
      <table style={{width:'100%',minWidth:520,borderCollapse:'collapse'}}>
        <thead>
          <tr>
            <td style={{padding:'20px 24px'}} aria-hidden="true"/>
            {cols.map((c,i)=><th key={i} scope="col" style={{...cellStyle(c.rec),textAlign:'left',verticalAlign:'top'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.08em',textTransform:'uppercase'}}>
                <span style={{color:c.rec?'var(--fg-2)':'var(--fg-3)'}}>{c.name}</span>
                {c.rec?<span style={{display:'inline-flex',alignItems:'center',gap:6,color:'var(--accent-subtle-fg)'}}><LiveDot size={5}/>recommended</span>:null}
              </div>
              <div style={{display:'flex',alignItems:'baseline',gap:4,marginTop:12}}>
                <span style={{fontFamily:'var(--font-mono)',fontSize:32,fontWeight:500,color:'var(--fg-1)'}}>{c.price}</span>
                {c.per?<span style={{fontFamily:'var(--font-mono)',fontSize:13,color:c.rec?'var(--fg-2)':'var(--fg-3)'}}>{c.per}</span>:null}
              </div>
            </th>)}
          </tr>
        </thead>
        <tbody>
          {specs.map((s,i)=><tr key={i} style={{borderTop:'1px solid var(--border-1)'}}>
            <th scope="row" style={rowLabel}>{s[0]}</th>
            {s[1].map((v,j)=><td key={j} style={cellStyle(cols[j].rec)}>{cell(v,cols[j].rec)}</td>)}
          </tr>)}
        </tbody>
        <tfoot>
          <tr style={{borderTop:'1px solid var(--border-1)'}}>
            <td style={{padding:'16px 24px'}} aria-hidden="true"/>
            {cols.map((c,i)=><td key={i} style={{...cellStyle(c.rec),padding:'16px 24px'}}>
              <Btn variant={c.primary?'primary':'secondary'} style={{width:'100%',justifyContent:'center'}}>{c.cta}</Btn>
            </td>)}
          </tr>
        </tfoot>
      </table>
    </div>
    {/* Stacked mobile plans (≤560px) — recommended first, specs as dotted-leader
        status lines. The table above is display:none'd, so no AT duplication. */}
    <div className="fz-price-stack">
      {[1,0].map(i=>{const c=cols[i];const ink=c.rec?'var(--fg-2)':'var(--fg-3)';
      return <div key={i} style={{border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:c.rec?'var(--accent-subtle)':'var(--bg-1)',padding:'var(--space-5)',display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.08em',textTransform:'uppercase'}}>
          <span style={{color:ink}}>{c.name}</span>
          {c.rec?<span style={{display:'inline-flex',alignItems:'center',gap:6,color:'var(--accent-subtle-fg)'}}><LiveDot size={5}/>recommended</span>:null}
        </div>
        <div style={{display:'flex',alignItems:'baseline',gap:4}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:32,fontWeight:500,color:'var(--fg-1)'}}>{c.price}</span>
          {c.per?<span style={{fontFamily:'var(--font-mono)',fontSize:13,color:ink}}>{c.per}</span>:null}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'var(--space-2)'}}>
          {specs.map((s,k)=><StatRow key={k} k={s[0]} v={cell(s[1][i],c.rec)} labelColor={ink}/>)}
        </div>
        <Btn variant={c.primary?'primary':'secondary'} style={{width:'100%',justifyContent:'center'}}>{c.cta}</Btn>
      </div>;})}
    </div>
    {/* Enterprise — a hairline row, not a third column: the needs are named,
        the price is a conversation. Visible at every breakpoint. */}
    <div style={{marginTop:'var(--space-3)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',background:'var(--bg-1)',padding:'var(--space-4) var(--space-5)',display:'flex',alignItems:'center',gap:'var(--space-4)',flexWrap:'wrap'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--fg-3)'}}>enterprise</span>
      <span aria-hidden="true" style={{flex:1,minWidth:24,borderBottom:'1px dotted var(--border-3)',transform:'translateY(-3px)'}}/>
      <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-2)'}}>everything in Team + SSO & SAML · on-prem / BYOK · custom retention · dedicated SLA</span>
      <Btn variant="secondary">Contact sales</Btn>
    </div>
  </section>;
}

function Footer() {
  return <footer style={{borderTop:'1px solid var(--border-1)',background:'var(--bg-1)'}}><div className="fz-footer" style={{maxWidth:1200,margin:'0 auto',padding:'32px 40px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
    <div style={{display:'flex',alignItems:'center',gap:9}}>
      <div style={{width:18,height:18,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:3,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}}>© 2026 Futurist Labs</span>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:8,fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}}>
      <LiveDot size={5}/><span>status</span><span aria-hidden="true" style={{color:'var(--fg-4)'}}>········</span><span style={{color:'var(--fg-2)'}}>operational</span>
    </div>
    <div style={{display:'flex',gap:20}}>{['Status','Security','Terms','Privacy'].map(x=><a key={x} href="#" style={{fontSize:13,color:'var(--fg-3)'}}>{x}</a>)}</div>
  </div></footer>;
}

function App(){return <div style={{background:'var(--bg-0)'}}><Nav/><Hero/><Features/><StatBand/><Pricing/><Footer/></div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
