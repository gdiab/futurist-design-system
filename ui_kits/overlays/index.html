<!-- @dsCard group="Overlays" viewport="1280x760" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Overlays</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>#root{min-height:100vh;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState, useRef, useEffect } = React;
const Ic = ({d,size=16,sw=1.7}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  info:<><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></>, edit:<path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/>,
  copy:<><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></>, trash:<path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/>,
  dots:<><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></>, filter:<path d="M3 5h18l-7 8v6l-4-2v-4z"/>,
  sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>, moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
};
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

function Btn({variant='secondary',children,onClick,style,...r}) {
  const [h,setH]=useState(false);
  const V={primary:{background:h?'var(--accent-hover)':'var(--accent)',color:'var(--accent-fg)',border:'1px solid transparent'},secondary:{background:h?'var(--bg-2)':'var(--bg-1)',color:'var(--fg-1)',border:'1px solid var(--border-3)'}}[variant];
  return <button type="button" onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',gap:8,height:32,padding:'0 12px',fontSize:13,fontFamily:'var(--font-sans)',fontWeight:500,borderRadius:'var(--radius-md)',cursor:'pointer',transition:'all var(--dur-fast)',...V,...style}} {...r}>{children}</button>;
}

function Tooltip({label,side='top',children}) {
  const [o,setO]=useState(false);
  const pos={top:{bottom:'100%',left:'50%',transform:'translateX(-50%)',marginBottom:8},bottom:{top:'100%',left:'50%',transform:'translateX(-50%)',marginTop:8},left:{right:'100%',top:'50%',transform:'translateY(-50%)',marginRight:8},right:{left:'100%',top:'50%',transform:'translateY(-50%)',marginLeft:8}}[side];
  return <span style={{position:'relative',display:'inline-flex'}} onMouseEnter={()=>setO(true)} onMouseLeave={()=>setO(false)}>{children}{o?<span style={{position:'absolute',zIndex:50,...pos,whiteSpace:'nowrap',padding:'4px 8px',background:'var(--bg-inverse)',color:'var(--fg-inverse)',fontSize:12,borderRadius:'var(--radius-sm)',boxShadow:'var(--shadow-2)',pointerEvents:'none'}}>{label}</span>:null}</span>;
}
function useOutside(cb){ const r=useRef(null); useEffect(()=>{const h=e=>{if(r.current&&!r.current.contains(e.target))cb();};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);}); return r; }
function Menu({trigger,items,align='start'}) {
  const [o,setO]=useState(false); const r=useOutside(()=>setO(false));
  const listRef=useRef(null); const startAt=useRef('first');
  const itemEls=()=>listRef.current?Array.prototype.slice.call(listRef.current.querySelectorAll('[role="menuitem"]:not([disabled])')):[];
  const closeAndRestore=()=>{setO(false);const t=r.current&&r.current.querySelector('[aria-haspopup="menu"]');t&&t.focus();};
  useEffect(()=>{ if(!o)return; const els=itemEls(); const t=startAt.current==='last'?els[els.length-1]:els[0]; t&&t.focus(); startAt.current='first'; },[o]);
  const move=(d)=>{const els=itemEls();if(!els.length)return;const i=els.indexOf(document.activeElement);els[i===-1?(d>0?0:els.length-1):(i+d+els.length)%els.length].focus();};
  const onTriggerKey=e=>{ if(e.key==='ArrowDown'){e.preventDefault();startAt.current='first';setO(true);} else if(e.key==='ArrowUp'){e.preventDefault();startAt.current='last';setO(true);} };
  const onMenuKey=e=>{ if(e.key==='Escape'){e.stopPropagation();closeAndRestore();} else if(e.key==='ArrowDown'){e.preventDefault();move(1);} else if(e.key==='ArrowUp'){e.preventDefault();move(-1);} else if(e.key==='Tab'){setO(false);} };
  const tProps={'aria-haspopup':'menu','aria-expanded':o,onKeyDown:onTriggerKey,onClick:()=>setO(v=>!v)};
  const triggerNode=React.isValidElement(trigger)?React.cloneElement(trigger,tProps):<button type="button" {...tProps} style={{display:'inline-flex',padding:0,border:'none',background:'transparent',font:'inherit',color:'inherit',cursor:'pointer'}}>{trigger}</button>;
  return <div ref={r} style={{position:'relative',display:'inline-flex'}}>
    {triggerNode}
    {o?<div ref={listRef} role="menu" onKeyDown={onMenuKey} style={{position:'absolute',top:'100%',[align==='end'?'right':'left']:0,marginTop:8,zIndex:60,minWidth:190,padding:4,background:'var(--bg-1)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-md)',boxShadow:'var(--shadow-3)'}}>
      {items.map((it,i)=>it.divider?<div key={i} role="separator" style={{height:1,background:'var(--border-1)',margin:'4px 0'}}/>:
        <button key={i} type="button" role="menuitem" tabIndex={-1} onClick={()=>{it.onClick&&it.onClick();closeAndRestore();}} onMouseEnter={e=>e.currentTarget.style.background=it.danger?'var(--danger-subtle)':'var(--bg-2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'} onFocus={e=>e.currentTarget.style.background=it.danger?'var(--danger-subtle)':'var(--bg-2)'} onBlur={e=>e.currentTarget.style.background='transparent'} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:8,border:'none',background:'transparent',borderRadius:'var(--radius-sm)',cursor:'pointer',textAlign:'left',fontFamily:'var(--font-sans)',fontSize:13,color:it.danger?'var(--danger)':'var(--fg-1)'}}>
          {it.icon?<span style={{display:'inline-flex',color:it.danger?'var(--danger)':'var(--fg-3)'}}>{it.icon}</span>:null}<span style={{flex:1}}>{it.label}</span>{it.shortcut?<span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>{it.shortcut}</span>:null}
        </button>)}
    </div>:null}
  </div>;
}
function Popover({trigger,children,width=260,align='start'}) {
  const [o,setO]=useState(false); const r=useOutside(()=>setO(false));
  const tProps={'aria-haspopup':'dialog','aria-expanded':o,onClick:()=>setO(v=>!v)};
  const triggerNode=React.isValidElement(trigger)?React.cloneElement(trigger,tProps):<button type="button" {...tProps} style={{display:'inline-flex',padding:0,border:'none',background:'transparent',font:'inherit',color:'inherit',cursor:'pointer'}}>{trigger}</button>;
  return <div ref={r} style={{position:'relative',display:'inline-flex'}} onKeyDown={e=>{if(e.key==='Escape'&&o){setO(false);const t=r.current&&r.current.querySelector('[aria-haspopup="dialog"]');t&&t.focus();}}}>
    {triggerNode}
    {o?<div style={{position:'absolute',top:'100%',[align==='end'?'right':'left']:0,marginTop:8,zIndex:60,width,padding:16,background:'var(--bg-1)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-3)'}}>{children}</div>:null}
  </div>;
}
function Drawer({open,onClose,title,children,footer}) {
  useEffect(()=>{if(!open)return;const k=e=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',k);return()=>window.removeEventListener('keydown',k);},[open]);
  if(!open)return null;
  return <div onMouseDown={onClose} style={{position:'fixed',inset:0,zIndex:1000,display:'flex',justifyContent:'flex-end',background:'var(--scrim)',backdropFilter:'blur(2px)'}}>
    <div onMouseDown={e=>e.stopPropagation()} style={{width:400,maxWidth:'92vw',height:'100%',display:'flex',flexDirection:'column',background:'var(--bg-1)',borderLeft:'1px solid var(--border-1)',boxShadow:'var(--shadow-3)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid var(--border-1)'}}><h3 style={{fontSize:15,fontWeight:600}}>{title}</h3><button type="button" aria-label="Close" onClick={onClose} style={{border:'none',background:'transparent',cursor:'pointer',color:'var(--fg-3)',fontSize:18}}>×</button></div>
      <div style={{flex:1,overflow:'auto',padding:20}}>{children}</div>
      {footer?<div style={{display:'flex',justifyContent:'flex-end',gap:8,padding:'16px 20px',borderTop:'1px solid var(--border-1)',background:'var(--bg-2)'}}>{footer}</div>:null}
    </div>
  </div>;
}

function Card({title,note,children}) {
  return <section style={{display:'flex',flexDirection:'column',gap:16,background:'var(--bg-1)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',padding:20,boxShadow:'var(--shadow-1)',minHeight:180}}>
    <div style={{display:'flex',flexDirection:'column',gap:4}}><span style={{fontSize:14,fontWeight:600,color:'var(--fg-1)'}}>{title}</span><span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>{note}</span></div>
    <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap',flex:1}}>{children}</div>
  </section>;
}

function App() {
  const [dark,setDark]=useState(false);
  const [drawer,setDrawer]=useState(false);
  const setTheme=(d)=>{setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  return <div style={{background:'var(--bg-0)',minHeight:'100vh'}}>
    <header style={{position:'sticky',top:0,zIndex:10,display:'flex',alignItems:'center',gap:12,height:56,padding:'0 28px',borderBottom:'1px solid var(--border-1)',background:'var(--surface-overlay)',backdropFilter:'blur(10px)'}}>
      <div style={{width:22,height:22,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:16,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Futurist</span>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>// overlays</span>
      <button type="button" onClick={()=>setTheme(!dark)} aria-pressed={dark} aria-label={dark?'Switch to light theme':'Switch to dark theme'} style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:8,height:30,padding:'0 12px',border:'1px solid var(--border-1)',borderRadius:'var(--radius-md)',background:'transparent',color:'var(--fg-2)',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.04em'}}><Icon name={dark?'sun':'moon'} size={14}/>{dark?'DARK':'LIGHT'}</button>
    </header>
    <div style={{padding:'24px 28px',display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16,maxWidth:920,margin:'0 auto'}}>
      <Card title="Tooltip" note="hover · 4 sides">
        <Tooltip label="Top" side="top"><Btn>Top</Btn></Tooltip>
        <Tooltip label="Right" side="right"><Btn>Right</Btn></Tooltip>
        <Tooltip label="Bottom" side="bottom"><Btn>Bottom</Btn></Tooltip>
        <Tooltip label="Requests per second" side="top"><span style={{display:'inline-flex',color:'var(--fg-3)',cursor:'help'}}><Icon name="info" size={18}/></span></Tooltip>
      </Card>
      <Card title="Dropdown menu" note="click · icons, shortcuts, danger">
        <Menu trigger={<Btn>Actions ▾</Btn>} items={[
          {label:'Edit',icon:<Icon name="edit" size={15}/>,shortcut:'E'},
          {label:'Duplicate',icon:<Icon name="copy" size={15}/>,shortcut:'D'},
          {divider:true},
          {label:'Delete',icon:<Icon name="trash" size={15}/>,danger:true,shortcut:'⌫'},
        ]}/>
        <Menu align="end" trigger={<button type="button" aria-label="More actions" style={{display:'inline-flex',width:32,height:32,alignItems:'center',justifyContent:'center',background:'transparent',border:'1px solid var(--border-3)',borderRadius:'var(--radius-md)',cursor:'pointer',color:'var(--fg-3)'}}><Icon name="dots" size={16}/></button>} items={[{label:'View details'},{label:'Copy link'},{divider:true},{label:'Remove',danger:true}]}/>
      </Card>
      <Card title="Popover" note="click · rich content">
        <Popover trigger={<Btn><Icon name="filter" size={14}/>Filter</Btn>}>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <span style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--fg-3)'}}>Status</span>
            {['Healthy','Degraded','Down'].map(s=><label key={s} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--fg-1)',cursor:'pointer'}}><input type="checkbox" defaultChecked style={{accentColor:'var(--accent)'}}/>{s}</label>)}
            <Btn variant="primary" style={{marginTop:4,justifyContent:'center'}}>Apply</Btn>
          </div>
        </Popover>
        <Popover align="start" width={220} trigger={<button type="button" aria-label="Account" style={{display:'inline-flex',alignItems:'center',gap:8,cursor:'pointer',padding:0,border:'none',background:'transparent'}}><span style={{width:26,height:26,borderRadius:999,background:'var(--accent)',color:'var(--accent-fg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-mono)',fontSize:11,fontWeight:600}}>GD</span></button>}>
          <div style={{display:'flex',flexDirection:'column',gap:2}}><span style={{fontSize:13,fontWeight:600,color:'var(--fg-1)'}}>George Diab</span><span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>george@futurist.dev</span></div>
        </Popover>
      </Card>
      <Card title="Drawer" note="slide-over · scrim · esc to close">
        <Btn variant="primary" onClick={()=>setDrawer(true)}>Open service detail</Btn>
      </Card>
    </div>
    <Drawer open={drawer} onClose={()=>setDrawer(false)} title="api-gateway" footer={<><Btn onClick={()=>setDrawer(false)}>Close</Btn><Btn variant="primary" onClick={()=>setDrawer(false)}>Restart</Btn></>}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {[['Region','us-east-1'],['Status','healthy'],['Req/min','18,420'],['P99','42ms'],['Uptime','99.99%'],['Version','v2.4.1']].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:13,paddingBottom:12,borderBottom:'1px solid var(--border-1)'}}><span style={{color:'var(--fg-3)'}}>{k}</span><span style={{fontFamily:'var(--font-mono)',color:'var(--fg-1)',fontWeight:500}}>{v}</span></div>)}
      </div>
    </Drawer>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function () {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    new Function('React', 'ReactDOM', out)(window.React, window.ReactDOM);
  })();
</script>
</body>
</html>
