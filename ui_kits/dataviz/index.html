<!-- @dsCard group="Data-viz" viewport="1280x900" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Data-viz</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>#root{min-height:100vh;} text{font-family:var(--font-mono);}</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState } = React;
const Ic = ({d,size=16,sw=1.7}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = { sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>, moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/> };
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

function Panel({title,note,children,span=1}) {
  return <section style={{gridColumn:'span '+span,display:'flex',flexDirection:'column',background:'var(--bg-1)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-1)',overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid var(--border-1)'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)'}}>{title}</span>
      {note?<span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>{note}</span>:null}
    </div>
    <div style={{padding:16,flex:1}}>{children}</div>
  </section>;
}
const G = (v)=>`var(--viz-${v})`;

/* smooth path from points */
function line(pts){ return pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' '); }
function series(vals,w,h,pad=6){ const max=Math.max(...vals),min=Math.min(...vals); const rng=max-min||1; return vals.map((v,i)=>[pad+i/(vals.length-1)*(w-pad*2), h-pad-((v-min)/rng)*(h-pad*2)]); }

function AreaChart() {
  const w=520,h=180;
  const a=[42,48,45,58,54,66,62,71,68,80,76,88,84,95,90,102];
  const b=[30,34,32,40,38,45,42,49,47,55,52,60,58,64,62,70];
  const pa=series(a,w,h), pb=series(b,w,h);
  const [hi,setHi]=useState(pa.length-1);
  return <div>
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} onMouseLeave={()=>setHi(pa.length-1)}>
      <defs><linearGradient id="ga" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={G(1)} stopOpacity="0.22"/><stop offset="100%" stopColor={G(1)} stopOpacity="0"/></linearGradient></defs>
      {[0.25,0.5,0.75].map(g=><line key={g} x1="0" x2={w} y1={h*g} y2={h*g} stroke="var(--border-1)" strokeWidth="1"/>)}
      <path d={line(pa)+`L ${w-6} ${h-6} L 6 ${h-6} Z`} fill="url(#ga)"/>
      <path d={line(pb)} fill="none" stroke={G(2)} strokeWidth="2" strokeDasharray="3 3" strokeLinecap="round"/>
      <path d={line(pa)} fill="none" stroke={G(1)} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
      {pa.map((p,i)=><rect key={i} x={p[0]-14} y="0" width="28" height={h} fill="transparent" onMouseEnter={()=>setHi(i)}/>)}
      {hi!=null && <><line x1={pa[hi][0]} x2={pa[hi][0]} y1="0" y2={h} stroke="var(--border-2)" strokeWidth="1"/><circle cx={pa[hi][0]} cy={pa[hi][1]} r="4" fill="var(--bg-1)" stroke={G(1)} strokeWidth="2.4"/></>}
    </svg>
    <div style={{display:'flex',gap:16,marginTop:10,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>
      <span style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:10,height:3,background:G(1),borderRadius:2}}/>requests {a[hi]}k</span>
      <span style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:10,height:3,background:G(2),borderRadius:2}}/>cache hits {b[hi]}k</span>
    </div>
  </div>;
}

function Donut() {
  const data=[["compute",42,1],["storage",28,2],["network",18,3],["egress",12,4]];
  const total=data.reduce((s,d)=>s+d[1],0);
  let acc=0; const r=52,c=2*Math.PI*r;
  return <div style={{display:'flex',alignItems:'center',gap:18}}>
    <svg viewBox="0 0 140 140" width="140" height="140">
      <g transform="rotate(-90 70 70)">
        {data.map((d,i)=>{ const frac=d[1]/total; const seg=<circle key={i} cx="70" cy="70" r={r} fill="none" stroke={G(d[2])} strokeWidth="16" strokeDasharray={`${frac*c} ${c}`} strokeDashoffset={-acc*c}/>; acc+=frac; return seg; })}
      </g>
      <text x="70" y="66" textAnchor="middle" fontSize="22" fontWeight="600" fill="var(--fg-1)" fontFamily="var(--font-display)">$18k</text>
      <text x="70" y="82" textAnchor="middle" fontSize="9" fill="var(--fg-3)" letterSpacing="1">MONTHLY</text>
    </svg>
    <div style={{display:'flex',flexDirection:'column',gap:8,flex:1}}>
      {data.map((d,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}><span style={{width:9,height:9,borderRadius:2,background:G(d[2])}}/><span style={{color:'var(--fg-2)',flex:1}}>{d[0]}</span><span style={{fontFamily:'var(--font-mono)',color:'var(--fg-1)'}}>{d[1]}%</span></div>)}
    </div>
  </div>;
}

function Gauge({v=73}) {
  const r=54,c=Math.PI*r;
  const col=v>85?'var(--danger)':v>70?'var(--warning)':'var(--success)';
  return <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
    <svg viewBox="0 0 140 84" width="180" height="108">
      <path d="M16 74 A54 54 0 0 1 124 74" fill="none" stroke="var(--bg-3)" strokeWidth="12" strokeLinecap="round"/>
      <path d="M16 74 A54 54 0 0 1 124 74" fill="none" stroke={col} strokeWidth="12" strokeLinecap="round" strokeDasharray={`${v/100*c} ${c}`}/>
      <text x="70" y="66" textAnchor="middle" fontSize="26" fontWeight="600" fill="var(--fg-1)" fontFamily="var(--font-display)">{v}<tspan fontSize="13" fill="var(--fg-3)">%</tspan></text>
    </svg>
    <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)',marginTop:2}}>CPU utilization</span>
  </div>;
}

function Spark({vals,tone,label,value,delta,up}) {
  const w=120,h=34; const p=series(vals,w,h,3);
  return <div style={{display:'flex',flexDirection:'column',gap:8,padding:'2px 0'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--fg-3)'}}>{label}</span>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:up?'var(--success)':'var(--danger)'}}>{up?'↑':'↓'} {delta}</span>
    </div>
    <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:10}}>
      <span style={{fontFamily:'var(--font-display)',fontSize:22,fontWeight:600,letterSpacing:'-.02em',color:'var(--fg-1)'}}>{value}</span>
      <svg viewBox={`0 0 ${w} ${h}`} width={w} height={h}><path d={line(p)} fill="none" stroke={tone} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><circle cx={p[p.length-1][0]} cy={p[p.length-1][1]} r="2.6" fill={tone}/></svg>
    </div>
  </div>;
}

function Bars() {
  const cats=[["us-east",92,1],["eu-west",68,2],["ap-south",54,3],["sa-east",38,4],["af-south",22,6]];
  const max=100;
  return <div style={{display:'flex',flexDirection:'column',gap:10}}>
    {cats.map((d,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)',width:60}}>{d[0]}</span>
      <div style={{flex:1,height:14,background:'var(--bg-3)',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${d[1]/max*100}%`,background:G(d[2]),borderRadius:3}}/></div>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-1)',width:36,textAlign:'right'}}>{d[1]}%</span>
    </div>)}
  </div>;
}

function App() {
  const [dark,setDark]=useState(false);
  const setTheme=(d)=>{setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  const s1=[12,14,13,16,15,18,17,20,19,23]; const s2=[40,38,36,34,33,30,28,27,25,22]; const s3=[60,62,61,64,66,65,68,70,72,75];
  return <div style={{background:'var(--bg-0)',minHeight:'100vh'}}>
    <header style={{position:'sticky',top:0,zIndex:10,display:'flex',alignItems:'center',gap:12,height:56,padding:'0 28px',borderBottom:'1px solid var(--border-1)',background:'var(--surface-overlay)',backdropFilter:'blur(10px)'}}>
      <div style={{width:22,height:22,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:16,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Futurist</span>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>// data-viz</span>
      <button onClick={()=>setTheme(!dark)} aria-label="theme" style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:8,height:30,padding:'0 11px',border:'1px solid var(--border-1)',borderRadius:'var(--radius-md)',background:'transparent',color:'var(--fg-2)',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.04em'}}><Icon name={dark?'sun':'moon'} size={14}/>{dark?'DARK':'LIGHT'}</button>
    </header>
    <div style={{padding:'24px 28px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,maxWidth:1240,margin:'0 auto',alignItems:'start'}}>
      <Panel title="Requests over time" note="hover to inspect" span={2}><AreaChart/></Panel>
      <Panel title="Cost breakdown"><Donut/></Panel>
      <Panel title="Sparklines">
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Spark label="Throughput" value="23.1k" delta="8%" up tone={G(1)} vals={s1}/>
          <div style={{height:1,background:'var(--border-1)'}}/>
          <Spark label="P99 latency" value="142ms" delta="12%" tone={G(3)} vals={s2}/>
          <div style={{height:1,background:'var(--border-1)'}}/>
          <Spark label="Uptime" value="99.98%" delta="0.01%" up tone={G(2)} vals={s3}/>
        </div>
      </Panel>
      <Panel title="Utilization"><Gauge v={73}/></Panel>
      <Panel title="Requests by region"><Bars/></Panel>
      <Panel title="Series palette" span={3}>
        <div style={{display:'flex',gap:10}}>
          {[1,2,3,4,5,6].map(i=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',gap:6}}><div style={{height:36,borderRadius:5,background:G(i)}}/><span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--fg-3)'}}>viz-{i}</span></div>)}
        </div>
      </Panel>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function () {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    new Function('React', 'ReactDOM', out)(window.React, window.ReactDOM);
  })();
</script>
</body>
</html>
