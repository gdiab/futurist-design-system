<!-- @dsCard group="Dashboard" viewport="1280x760" -->
<!-- @startingPoint section="Dashboard" subtitle="Data-dense observability console" viewport="1280x800" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — Console</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { height: 100%; }
  #root { height: 100vh; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 999px; border: 3px solid var(--bg-0); }
  /* Header search — real input, standard focus treatment */
  .hdr-search {
    appearance: none; -webkit-appearance: none;
    width: 100%; height: 32px; padding: 0 48px 0 32px;
    background: var(--bg-2); border: 1px solid var(--border-3); border-radius: var(--radius-md);
    font-family: var(--font-sans); font-size: 0.8125rem; color: var(--fg-1); outline: none;
    transition: border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard);
  }
  .hdr-search::placeholder { color: var(--fg-3); }
  .hdr-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState, useEffect, useRef } = React;

/* ── Icons (inline stroke set) ────────────────────────────── */
const Ic = ({ d, size = 16, sw = 1.7, fill = false }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill ? 'currentColor' : 'none'} stroke={fill ? 'none' : 'currentColor'} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const icons = {
  grid: <><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>,
  activity: <path d="M3 12h4l3 8 4-16 3 8h4"/>,
  server: <><rect x="3" y="4" width="18" height="7" rx="1.5"/><rect x="3" y="13" width="18" height="7" rx="1.5"/><path d="M7 7.5h.01M7 16.5h.01"/></>,
  layers: <><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></>,
  bell: <path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/>,
  settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-2.7 1.1V21a2 2 0 11-4 0v-.1A1.6 1.6 0 006 19.4l-.1.1a2 2 0 11-2.8-2.8l.1-.1A1.6 1.6 0 003.6 15H3.5a2 2 0 110-4h.1A1.6 1.6 0 004.6 8.3l-.1-.1a2 2 0 112.8-2.8l.1.1a1.6 1.6 0 001.8.3H9a1.6 1.6 0 001-1.5V4a2 2 0 114 0v.1a1.6 1.6 0 001 1.5 1.6 1.6 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00-.3 1.8V9a1.6 1.6 0 001.5 1H21a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z"/></>,
  search: <><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>,
  sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>,
  moon: <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
  plus: <path d="M12 5v14M5 12h14"/>,
  chevron: <path d="M9 6l6 6-6 6"/>,
};
const Icon = ({ name, ...p }) => <Ic d={icons[name]} {...p} />;

/* ── Primitives (token-styled; mirror the DS components) ──── */
function Button({ variant='primary', size='md', children, style, ...r }) {
  const [h,setH]=useState(false);
  const S={sm:{height:26,px:8,fs:12},md:{height:32,px:12,fs:13},lg:{height:40,px:16,fs:14}}[size];
  const V={
    primary:{background:h?'var(--accent-hover)':'var(--accent)',color:'var(--accent-fg)',border:'1px solid transparent'},
    secondary:{background:h?'var(--bg-2)':'var(--bg-1)',color:'var(--fg-1)',border:'1px solid var(--border-3)'},
    ghost:{background:h?'var(--bg-2)':'transparent',color:h?'var(--fg-1)':'var(--fg-2)',border:'1px solid transparent'},
    danger:{background:'var(--danger)',color:'var(--danger-fg)',border:'1px solid transparent',filter:h?'brightness(.94)':'none'},
  }[variant];
  return <button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,height:S.height,padding:`0 ${S.px}px`,fontSize:S.fs,fontFamily:'var(--font-sans)',fontWeight:500,borderRadius:'var(--radius-md)',cursor:'pointer',whiteSpace:'nowrap',transition:'all var(--dur-fast) var(--ease-standard)',...V,...style}} {...r}>{children}</button>;
}
function IconButton({ label, active, children, style, ...r }) {
  const [h,setH]=useState(false);
  return <button aria-label={label} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:32,height:32,borderRadius:'var(--radius-md)',cursor:'pointer',border:'1px solid '+(active?'var(--border-3)':'transparent'),background:(h||active)?'var(--bg-2)':'transparent',color:(h||active)?'var(--fg-1)':'var(--fg-3)',transition:'all var(--dur-fast)',...style}} {...r}>{children}</button>;
}
function Badge({ tone='neutral', dot, children }) {
  const T={neutral:['var(--bg-3)','var(--fg-2)'],accent:['var(--accent-subtle)','var(--accent-subtle-fg)'],success:['var(--success-subtle)','var(--success-subtle-fg)'],warning:['var(--warning-subtle)','var(--warning-subtle-fg)'],danger:['var(--danger-subtle)','var(--danger-subtle-fg)'],info:['var(--info-subtle)','var(--info-subtle-fg)']}[tone];
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,height:18,padding:'0 8px',borderRadius:'var(--radius-sm)',fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.03em',background:T[0],color:T[1],whiteSpace:'nowrap'}}>{dot?<span style={{width:5,height:5,borderRadius:'50%',background:'currentColor'}}/>:null}{children}</span>;
}
function Card({ children, style }) {
  return <div style={{background:'var(--bg-1)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-1)',...style}}>{children}</div>;
}
function Stat({ label, value, unit, delta, trend, lowerIsBetter=false }) {
  /* Valence-aware delta color: improving → success, worsening → danger (One Signal Rule — status semantics, not accent). */
  const improving=trend==='up'?!lowerIsBetter:trend==='down'?lowerIsBetter:null;
  const c=improving==null?'var(--fg-3)':improving?'var(--success)':'var(--danger)';
  const a=trend==='up'?'↑':trend==='down'?'↓':'';
  return <div style={{display:'flex',flexDirection:'column',gap:8}}>
    <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)'}}>{label}</span>
    <div style={{display:'flex',alignItems:'baseline',gap:4}}><span style={{fontFamily:'var(--font-mono)',fontSize:30,fontWeight:600,letterSpacing:'-.02em',color:'var(--fg-1)',lineHeight:1}}>{value}</span>{unit?<span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--fg-3)'}}>{unit}</span>:null}</div>
    {delta!=null?<span style={{fontFamily:'var(--font-mono)',fontSize:12,color:c}}>{a} {delta}</span>:null}
  </div>;
}
function Switch({ on, onClick }) {
  return <button onClick={onClick} aria-label="toggle" style={{width:30,height:18,borderRadius:999,position:'relative',cursor:'pointer',background:on?'var(--accent)':'var(--bg-3)',border:'1px solid '+(on?'var(--accent)':'var(--border-3)'),transition:'background var(--dur-base)'}}><span style={{position:'absolute',top:2,left:on?13:2,width:13,height:13,borderRadius:999,background:'#fff',boxShadow:'0 1px 2px rgba(0,0,0,.25)',transition:'left var(--dur-base) var(--ease-standard)'}}/></button>;
}

/* ── Chart (simple token-colored bars) ────────────────────── */
/* Live ticking: bars carry stable ids; a bar that entered after initial
   render mounts at 0 and transitions to height over --dur-base (mechanical,
   ≤240ms). Reduced motion swaps instantly — data still updates. */
const CHART_SEED=[42,55,48,63,58,71,66,80,74,88,82,95];
function Bar({ v, accent, opacity, entering }) {
  const [h,setH]=useState(entering?0:v);
  const ref=useRef(null);
  useEffect(()=>{
    if(!entering){setH(v);return;}
    /* flush the mounted 0-height so the jump to v transitions (rAF is unreliable in hidden tabs) */
    if(ref.current) ref.current.getBoundingClientRect();
    setH(v);
  },[v,entering]);
  return <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',height:'100%'}}>
    <div ref={ref} style={{height:`${h}%`,background:accent?'var(--accent)':'var(--viz-1)',opacity,borderRadius:'3px 3px 0 0',transition:entering?'height var(--dur-base) var(--ease-standard)':'none'}}/>
  </div>;
}
function BarChart({ data, reducedMotion }) {
  const max=100;
  return <div style={{display:'flex',alignItems:'flex-end',gap:4,height:150,padding:'0 2px'}}>
    {data.map((d,i)=><Bar key={d.id} v={d.v/max*100} accent={i===data.length-1} opacity={i===data.length-1?1:.35+i*0.05} entering={!reducedMotion&&d.id>=CHART_SEED.length}/>)}
  </div>;
}

/* ── Services table ───────────────────────────────────────── */
const services=[
  ['api-gateway','us-east-1','ok',18420,42,'99.99%'],
  ['auth-service','us-east-1','ok',9310,38,'99.98%'],
  ['billing-worker','eu-west-1','degraded',2140,410,'99.42%'],
  ['search-index','ap-south-1','ok',5680,71,'99.95%'],
  ['media-encode','eu-west-1','down',0,null,'97.10%'],
  ['notifications','us-east-1','ok',12030,55,'99.97%'],
];
function ServicesTable() {
  const [hover,setHover]=useState(-1);
  const th={textAlign:'left',padding:'8px 12px',fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--fg-3)',borderBottom:'1px solid var(--border-1)',whiteSpace:'nowrap'};
  const td=(num)=>({padding:'8px 12px',color:num?'var(--fg-1)':'var(--fg-2)',fontFamily:num?'var(--font-mono)':'var(--font-sans)',fontSize:13,textAlign:num?'right':'left',whiteSpace:'nowrap'});
  const tone={ok:'success',degraded:'warning',down:'danger'};
  return <Card>
    <table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr style={{background:'var(--bg-2)'}}>
        <th style={th}>Service</th><th style={th}>Region</th><th style={th}>Status</th>
        <th style={{...th,textAlign:'right'}}>Req/min</th><th style={{...th,textAlign:'right'}}>P99 (ms)</th><th style={{...th,textAlign:'right'}}>Uptime</th>
      </tr></thead>
      <tbody>{services.map((s,i)=><tr key={i} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(-1)} style={{background:hover===i?'var(--bg-2)':'transparent',transition:'background var(--dur-fast)'}}>
        <td style={{...td(false),color:'var(--fg-1)',fontWeight:500}}>{s[0]}</td>
        <td style={{...td(false),fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}}>{s[1]}</td>
        <td style={td(false)}><Badge tone={tone[s[2]]} dot>{s[2]}</Badge></td>
        <td style={td(true)}>{s[3].toLocaleString()}</td>
        <td style={{...td(true),color:s[4]===null?'var(--fg-3)':s[4]>200?'var(--danger)':'var(--fg-1)'}}>{s[4]===null?'—':s[4]}</td>
        <td style={td(true)}>{s[5]}</td>
      </tr>)}</tbody>
    </table>
  </Card>;
}

/* ── App shell ────────────────────────────────────────────── */
const nav=[['grid','Overview'],['activity','Metrics'],['server','Services'],['layers','Deployments'],['settings','Settings']];
function App() {
  const [dark,setDark]=useState(false);
  const [route,setRoute]=useState('Overview');
  const [tab,setTab]=useState('live');
  const [authed,setAuthed]=useState(true);
  const setTheme=(d)=>{setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};

  /* Live tick — chart bars shift left, new bar enters; Requests/min walks.
     Runs only while the Live tab is active and the page is visible. */
  const [chart,setChart]=useState(()=>CHART_SEED.map((v,i)=>({id:i,v})));
  const [reqRate,setReqRate]=useState(18.4);
  const nextBarId=useRef(CHART_SEED.length);
  const [reducedMotion,setReducedMotion]=useState(()=>window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  useEffect(()=>{
    const mq=window.matchMedia('(prefers-reduced-motion: reduce)');
    const onChange=(e)=>setReducedMotion(e.matches);
    mq.addEventListener('change',onChange);
    return ()=>mq.removeEventListener('change',onChange);
  },[]);
  useEffect(()=>{
    if(tab!=='live') return;
    let iv=null;
    const tick=()=>{
      setChart(prev=>{
        /* small random walk from the last bar, clamped to plausible range */
        const last=prev[prev.length-1].v;
        const v=Math.min(98,Math.max(35,Math.round(last+(Math.random()*16-8))));
        return [...prev.slice(1),{id:nextBarId.current++,v}];
      });
      setReqRate(prev=>{
        const d=(0.1+Math.random()*0.3)*(Math.random()<0.5?-1:1);
        return Math.round(Math.min(19.6,Math.max(17.2,prev+d))*10)/10;
      });
    };
    const start=()=>{if(iv==null) iv=setInterval(tick,3000);};
    const stop=()=>{if(iv!=null){clearInterval(iv);iv=null;}};
    const onVis=()=>{document.hidden?stop():start();};
    document.addEventListener('visibilitychange',onVis);
    if(!document.hidden) start();
    return ()=>{stop();document.removeEventListener('visibilitychange',onVis);};
  },[tab]);

  /* ⌘K / Ctrl+K focuses the header search */
  useEffect(()=>{
    const onKey=(e)=>{
      if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){
        e.preventDefault();
        const el=document.getElementById('global-search');
        if(el) el.focus();
      }
    };
    document.addEventListener('keydown',onKey);
    return ()=>document.removeEventListener('keydown',onKey);
  },[]);

  if(!authed) return <Login onIn={()=>setAuthed(true)} dark={dark} setTheme={setTheme}/>;

  const tabs=[['live','Live'],['24h','24h'],['7d','7d'],['30d','30d']];
  return <div style={{display:'grid',gridTemplateColumns:'var(--sidebar-w) 1fr',height:'100vh',background:'var(--bg-0)'}}>
    {/* sidebar */}
    <aside style={{borderRight:'1px solid var(--border-1)',background:'var(--bg-1)',display:'flex',flexDirection:'column',padding:'12px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 8px 16px'}}>
        <div style={{width:22,height:22,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
        <span style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:16,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Futurist</span>
      </div>
      <nav style={{display:'flex',flexDirection:'column',gap:2}}>
        {nav.map(([ic,label])=>{const on=route===label;return <button key={label} onClick={()=>setRoute(label)} style={{display:'flex',alignItems:'center',gap:8,height:32,padding:'0 8px',borderRadius:'var(--radius-md)',border:'none',cursor:'pointer',background:on?'var(--accent-subtle)':'transparent',color:on?'var(--accent-subtle-fg)':'var(--fg-2)',fontSize:13,fontWeight:on?600:500,fontFamily:'var(--font-sans)',textAlign:'left'}}><Icon name={ic} size={16}/>{label}</button>;})}
      </nav>
      <div style={{marginTop:'auto',padding:'12px 8px 4px',borderTop:'1px solid var(--border-1)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>{dark?'DARK':'LIGHT'}</span>
        <Switch on={dark} onClick={()=>setTheme(!dark)}/>
      </div>
    </aside>

    {/* main */}
    <main style={{display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
      <header style={{display:'flex',alignItems:'center',gap:12,height:52,padding:'0 20px',borderBottom:'1px solid var(--border-1)',background:'var(--bg-1)'}}>
        <div style={{position:'relative',display:'flex',alignItems:'center',flex:1,maxWidth:340}}>
          <span style={{position:'absolute',left:12,display:'flex',color:'var(--fg-3)',pointerEvents:'none'}}><Icon name="search" size={14}/></span>
          <input id="global-search" type="search" className="hdr-search" placeholder="Search services, logs…" aria-label="Search services and logs"/>
          <span style={{position:'absolute',right:12,fontFamily:'var(--font-mono)',fontSize:11,padding:'1px 4px',border:'1px solid var(--border-2)',borderRadius:3,color:'var(--fg-3)',pointerEvents:'none'}}>⌘K</span>
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
          <IconButton label="Notifications"><Icon name="bell" size={16}/></IconButton>
          <IconButton label="Theme" onClick={()=>setTheme(!dark)}><Icon name={dark?'sun':'moon'} size={16}/></IconButton>
          <div style={{width:1,height:20,background:'var(--border-1)',margin:'0 4px'}}/>
          <div style={{width:28,height:28,borderRadius:'var(--radius-full)',background:'var(--accent)',color:'var(--accent-fg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,fontFamily:'var(--font-mono)'}}>GD</div>
        </div>
      </header>

      <div style={{flex:1,overflow:'auto',padding:'20px 24px'}}>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:16,marginBottom:16}}>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--fg-3)'}}>Production · us-east-1</span>
            <h1 style={{fontSize:24,fontWeight:600}}>{route}</h1>
          </div>
          <div style={{display:'flex',gap:8}}>
            <Button variant="secondary" size="md"><Icon name="activity" size={14}/>Export</Button>
            <Button variant="primary" size="md"><Icon name="plus" size={14}/>New deploy</Button>
          </div>
        </div>

        {/* tabs */}
        <div style={{display:'flex',gap:2,borderBottom:'1px solid var(--border-1)',marginBottom:16}}>
          {tabs.map(([v,l])=>{const on=tab===v;return <button key={v} onClick={()=>setTab(v)} style={{position:'relative',height:34,padding:'0 12px',border:'none',background:'transparent',cursor:'pointer',fontSize:13,fontWeight:on?600:500,fontFamily:'var(--font-sans)',color:on?'var(--fg-1)':'var(--fg-3)'}}>{l}<span style={{position:'absolute',left:0,right:0,bottom:-1,height:2,background:on?'var(--accent)':'transparent',borderRadius:'2px 2px 0 0'}}/></button>;})}
        </div>

        {/* stat row */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:16}}>
          {/* lowerIsBetter: latency and error rate improve when they go down */}
          {[['Requests / min',reqRate.toFixed(1),'K','8.1% wk','up',false],['P99 latency','142','ms','12% wk','down',true],['Error rate','0.04','%','0.01 wk','down',true],['Uptime','99.98','%','30d','flat',false]].map((s,i)=><Card key={i} style={{padding:'16px 20px'}}><Stat label={s[0]} value={s[1]} unit={s[2]} delta={s[3]} trend={s[4]} lowerIsBetter={s[5]}/></Card>)}
        </div>

        {/* chart + side */}
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}}>
          <Card style={{padding:'16px 20px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div style={{display:'flex',flexDirection:'column',gap:2}}><span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)'}}>Throughput</span><span style={{fontSize:15,fontWeight:600,fontFamily:'var(--font-display)',color:'var(--fg-1)'}}>Requests over time</span></div>
              <Badge tone="success" dot>Live</Badge>
            </div>
            <BarChart data={chart} reducedMotion={reducedMotion}/>
          </Card>
          <Card style={{padding:'16px 20px',display:'flex',flexDirection:'column',gap:12}}>
            <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-3)'}}>Incidents</span>
            {[['danger','media-encode down','2m ago'],['warning','billing p99 spike','14m ago'],['info','deploy v2.4.1','1h ago']].map((x,i)=><div key={i} style={{display:'flex',gap:8,alignItems:'flex-start'}}><span style={{width:6,height:6,borderRadius:'50%',marginTop:6,background:`var(--${x[0]})`,flexShrink:0}}/><div style={{display:'flex',flexDirection:'column',gap:1}}><span style={{fontSize:13,color:'var(--fg-1)',fontWeight:500}}>{x[1]}</span><span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>{x[2]}</span></div></div>)}
          </Card>
        </div>

        {/* table */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:15,fontWeight:600,fontFamily:'var(--font-display)',color:'var(--fg-1)'}}>Services</span>
          <div style={{display:'flex',gap:8}}>
            <Badge tone="neutral">6 total</Badge><Badge tone="success">4 healthy</Badge><Badge tone="danger">1 down</Badge>
          </div>
        </div>
        <ServicesTable/>
        <div style={{height:20}}/>
      </div>
    </main>
  </div>;
}

/* ── Login screen ─────────────────────────────────────────── */
function Login({ onIn, dark, setTheme }) {
  return <div style={{height:'100vh',display:'grid',gridTemplateColumns:'1fr 1fr',background:'var(--bg-0)'}}>
