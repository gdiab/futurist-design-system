<!-- @dsCard group="States" viewport="1280x900" -->
<!-- Self-contained recipe: primitives are re-implemented inline for copy-paste use. components/ is the source of truth — prefer its specs where they differ. -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Futurist — States</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  #root{min-height:100vh;}
  @keyframes ftr-shimmer { 0%{background-position:-360px 0} 100%{background-position:360px 0} }
  @keyframes ftr-spin { to { transform: rotate(360deg) } }
  @keyframes ftr-pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .sk { background: linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 40%, var(--bg-2) 80%); background-size: 720px 100%; animation: ftr-shimmer 1.3s linear infinite; border-radius: var(--radius-sm); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState, useEffect } = React;
const Ic = ({d,size=16,sw=1.7}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  search:<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>,
  inbox:<><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5h13l3.5 7v6a1 1 0 01-1 1H3a1 1 0 01-1-1v-6z"/></>,
  alert:<><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L14.7 3.9a2 2 0 00-3.4 0z"/></>,
  offline:<><path d="M1 1l22 22"/><path d="M16.7 11.7a6 6 0 00-8-1M5 12.5a10 10 0 013-2M8.5 16.4a4 4 0 015 0"/><path d="M12 20h.01"/></>,
  plus:<path d="M12 5v14M5 12h14"/>, refresh:<><path d="M21 12a9 9 0 11-2.6-6.4"/><path d="M21 3v6h-6"/></>,
  sun:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></>,
  moon:<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
};
const Icon = ({name,...p}) => <Ic d={icons[name]} {...p}/>;

function Btn({variant='primary',children,onClick,style}) {
  const [h,setH]=useState(false);
  const V={primary:{background:h?'var(--accent-hover)':'var(--accent)',color:'var(--accent-fg)',border:'1px solid transparent'},secondary:{background:h?'var(--bg-2)':'var(--bg-1)',color:'var(--fg-1)',border:'1px solid var(--border-3)'}}[variant];
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,height:32,padding:'0 14px',fontSize:13,fontFamily:'var(--font-sans)',fontWeight:500,borderRadius:'var(--radius-md)',cursor:'pointer',transition:'all var(--dur-fast)',...V,...style}}>{children}</button>;
}
function Spinner({size=16,color='currentColor'}) {
  return <span style={{display:'inline-block',width:size,height:size,border:`2px solid color-mix(in oklch, ${color} 25%, transparent)`,borderTopColor:color,borderRadius:'50%',animation:'ftr-spin 0.7s linear infinite'}}/>;
}
function Placeholder({icon,tint='var(--fg-3)',bg='var(--bg-2)'}) {
  return <div style={{width:56,height:56,borderRadius:'var(--radius-lg)',background:bg,display:'flex',alignItems:'center',justifyContent:'center',color:tint}}><Icon name={icon} size={26}/></div>;
}

function Panel({title,children,note}) {
  return <section style={{display:'flex',flexDirection:'column',background:'var(--bg-1)',border:'1px solid var(--border-1)',borderRadius:'var(--radius-lg)',overflow:'hidden',boxShadow:'var(--shadow-1)'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 16px',borderBottom:'1px solid var(--border-1)',background:'var(--bg-2)'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--fg-2)'}}>{title}</span>
      {note?<span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--fg-3)'}}>{note}</span>:null}
    </div>
    <div style={{padding:18,minHeight:230,display:'flex',flexDirection:'column'}}>{children}</div>
  </section>;
}
const Center = ({children}) => <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',gap:12,padding:'12px 8px'}}>{children}</div>;
const Title = ({children}) => <div style={{fontSize:15,fontWeight:600,color:'var(--fg-1)'}}>{children}</div>;
const Sub = ({children}) => <p style={{fontSize:13,color:'var(--fg-3)',lineHeight:1.5,margin:0,maxWidth:260}}>{children}</p>;

/* Loading skeleton — table rows */
function SkeletonTable() {
  return <div style={{display:'flex',flexDirection:'column',gap:0,width:'100%'}}>
    <div style={{display:'flex',gap:12,padding:'0 0 12px'}}>
      <div className="sk" style={{height:12,width:90}}/><div className="sk" style={{height:12,width:70}}/><div className="sk" style={{height:12,width:60,marginLeft:'auto'}}/>
    </div>
    {[0,1,2,3].map(i=><div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderTop:'1px solid var(--border-1)'}}>
      <div className="sk" style={{height:20,width:20,borderRadius:999}}/>
      <div style={{display:'flex',flexDirection:'column',gap:6,flex:1}}><div className="sk" style={{height:11,width:`${60-i*6}%`}}/><div className="sk" style={{height:9,width:`${40-i*4}%`}}/></div>
      <div className="sk" style={{height:18,width:52,borderRadius:'var(--radius-sm)'}}/>
    </div>)}
  </div>;
}
/* Loading skeleton — card */
function SkeletonCard() {
  return <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%'}}>
    <div className="sk" style={{height:96,width:'100%',borderRadius:'var(--radius-md)'}}/>
    <div className="sk" style={{height:14,width:'85%'}}/>
    <div className="sk" style={{height:10,width:'100%'}}/>
    <div className="sk" style={{height:10,width:'92%'}}/>
    <div style={{display:'flex',gap:8,marginTop:2}}><div className="sk" style={{height:20,width:20,borderRadius:999}}/><div className="sk" style={{height:10,width:80,alignSelf:'center'}}/></div>
  </div>;
}

function InlineLoading() {
  const [state,setState]=useState('idle');
  const run=()=>{ setState('loading'); setTimeout(()=>setState('done'),1600); };
  return <Center>
    <Placeholder icon="refresh" tint="var(--accent-subtle-fg)" bg="var(--accent-subtle)"/>
    <Title>Inline & button loading</Title>
    <Sub>Actions show progress in place — never a full-page spinner for a local action.</Sub>
    <div style={{display:'flex',alignItems:'center',gap:12,marginTop:2}}>
      <Btn onClick={run}>{state==='loading'?<><Spinner size={14} color="var(--accent-fg)"/>Syncing…</>:state==='done'?'Synced ✓':'Sync now'}</Btn>
      <span style={{display:'inline-flex',alignItems:'center',gap:7,fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)'}}><Spinner size={14} color="var(--fg-3)"/>fetching…</span>
    </div>
  </Center>;
}

function App() {
  const [dark,setDark]=useState(false);
  const setTheme=(d)=>{setDark(d);document.documentElement.setAttribute('data-theme',d?'dark':'light');};
  return <div style={{background:'var(--bg-0)',minHeight:'100vh'}}>
    <header style={{position:'sticky',top:0,zIndex:10,display:'flex',alignItems:'center',gap:12,height:56,padding:'0 28px',borderBottom:'1px solid var(--border-1)',background:'var(--surface-overlay)',backdropFilter:'blur(10px)'}}>
      <div style={{width:22,height:22,border:'2px solid var(--fg-1)',borderRadius:3,position:'relative'}}><div style={{position:'absolute',inset:4,background:'var(--accent)',borderRadius:1}}/></div>
      <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:16,letterSpacing:'-.02em',color:'var(--fg-1)'}}>Futurist</span>
      <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>// empty · loading · error</span>
      <button onClick={()=>setTheme(!dark)} aria-label="theme" style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:8,height:30,padding:'0 11px',border:'1px solid var(--border-1)',borderRadius:'var(--radius-md)',background:'transparent',color:'var(--fg-2)',cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.04em'}}><Icon name={dark?'sun':'moon'} size={14}/>{dark?'DARK':'LIGHT'}</button>
    </header>

    <div style={{padding:'24px 28px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,maxWidth:1240,margin:'0 auto',alignItems:'start'}}>

      <Panel title="Loading — skeleton table" note="shimmer"><SkeletonTable/></Panel>
      <Panel title="Loading — skeleton card" note="shimmer"><SkeletonCard/></Panel>
      <Panel title="Loading — inline"><InlineLoading/></Panel>

      <Panel title="Empty — first run">
        <Center>
          <Placeholder icon="inbox"/>
          <Title>No services yet</Title>
          <Sub>Connect your first service to start streaming telemetry into the console.</Sub>
          <Btn style={{marginTop:2}}><Icon name="plus" size={14}/>Add a service</Btn>
        </Center>
      </Panel>

      <Panel title="Empty — no results">
        <Center>
          <Placeholder icon="search"/>
          <Title>No matches for “zigg”</Title>
          <Sub>Check the spelling or clear your filters — 6 services are hidden by the current query.</Sub>
          <Btn variant="secondary" style={{marginTop:2}}>Clear filters</Btn>
        </Center>
      </Panel>

      <Panel title="Error — failed to load">
        <Center>
          <Placeholder icon="alert" tint="var(--danger)" bg="var(--danger-subtle)"/>
          <Title>Couldn’t load metrics</Title>
          <Sub>The query timed out after 30s. This is usually transient.</Sub>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)'}}>ERR_QUERY_TIMEOUT · req_8f2c1a</div>
          <Btn variant="secondary" style={{marginTop:2}}><Icon name="refresh" size={14}/>Retry</Btn>
        </Center>
      </Panel>

      <Panel title="Offline">
        <Center>
          <Placeholder icon="offline" tint="var(--warning-subtle-fg)" bg="var(--warning-subtle)"/>
          <Title>You’re offline</Title>
          <Sub>Showing the last cached snapshot from 4 minutes ago. Live data resumes on reconnect.</Sub>
          <div style={{display:'inline-flex',alignItems:'center',gap:7,fontFamily:'var(--font-mono)',fontSize:12,color:'var(--fg-3)',marginTop:2}}><span style={{width:7,height:7,borderRadius:'50%',background:'var(--warning)',animation:'ftr-pulse 1.4s ease-in-out infinite'}}/>reconnecting…</div>
        </Center>
      </Panel>

      <Panel title="Empty — all clear">
        <Center>
          <Placeholder icon="alert" tint="var(--success)" bg="var(--success-subtle)"/>
          <Title>No incidents</Title>
          <Sub>Everything is operating within thresholds. We’ll alert you the moment that changes.</Sub>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--success)',marginTop:2}}>uptime 99.98% · 30d</div>
        </Center>
      </Panel>

      <Panel title="Restricted — no access">
        <Center>
          <Placeholder icon="alert"/>
          <Title>You don’t have access</Title>
          <Sub>This project is restricted to the Platform team. Request access from an admin.</Sub>
          <Btn variant="secondary" style={{marginTop:2}}>Request access</Btn>
        </Center>
      </Panel>

    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function () {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    new Function('React', 'ReactDOM', out)(window.React, window.ReactDOM);
  })();
</script>
</body>
</html>
